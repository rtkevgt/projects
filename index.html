<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Estudio Angela's</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Inter:wght@300;400;500;600&disp<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio Lash & Brow - Sistema</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">
<div id="root"></div>
<script type="text/babel">
  const { useState, useEffect, useMemo, useCallback, useRef } = React;

  /* ============================================================
     STORAGE — FIX #8 #9: manejo de cuota excedida + fotos separadas
     ============================================================ */
  const STORAGE_KEYS = {
    CLIENTS: "studio:clients",
    APPOINTMENTS: "studio:appointments",
    PHOTOS_PREFIX: "studio:photos:",          // una key por cliente
  };

  function storageGet(key, fallback) {
    try {
      const res = localStorage.getItem(key);
      if (res === null) return fallback;
      return JSON.parse(res);
    } catch { return fallback; }
  }

  function storageSet(key, value) {
    try {
      localStorage.setItem(key, JSON.stringify(value));
      return true;
    } catch (e) {
      if (e && (e.name === "QuotaExceededError" || e.code === 22)) {
        return "quota";
      }
      console.error("Error guardando", key, e);
      return false;
    }
  }

  // FIX #9: fotos guardadas por separado para no corromper datos de clientes
  function savePhotos(clientId, fotos) {
    return storageSet(STORAGE_KEYS.PHOTOS_PREFIX + clientId, fotos);
  }
  function loadPhotos(clientId) {
    return storageGet(STORAGE_KEYS.PHOTOS_PREFIX + clientId, []);
  }

  /* ============================================================
     DATOS BASE
     ============================================================ */
  const SERVICE_CATEGORIES = [
    { id: "pestanas", label: "Extensión de pestañas", icon: "lash" },
    { id: "lifting",  label: "Lifting de pestañas",   icon: "lift" },
    { id: "laminado", label: "Laminado de cejas",     icon: "brow" },
    { id: "depilacion", label: "Depilación",          icon: "wax"  },
    { id: "unas",     label: "Uñas",                  icon: "nail" },
    { id: "otro",     label: "Otro servicio",         icon: "star" },
  ];

  const CURVATURAS = ["B","C","CC","D","DD","L","L+","M"];
  const GROSORES   = ["0.03","0.05","0.07","0.10","0.12","0.15","0.18","0.20","0.25"];
  const TECNICAS   = ["Clásicas","2D","3D","Híbrida","Rimel","Rimel Teach","Griegas","Hawaianas","Tecnológico 4D","Tecnológico 5D","Tecnológico 6D","Russian Teach","Wispy","Volumen Ruso","FOXY","Mega Volumen"];

  function uid(prefix = "id") {
    return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 9)}`;
  }

  // FIX #16 #17: fecha local sin desfase UTC
  function localDateString() {
    const d = new Date();
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  function emptyClient() {
    return {
      id: uid("cli"),
      nombre: "",
      telefono: "",
      fechaNacimiento: "",
      observaciones: "",
      alergias: "",
      creadoEn: new Date().toISOString(),
      historial: [],
      fotos: [],        // se mantiene por retrocompatibilidad; ahora también en storage separado
    };
  }

  function emptyHistorialEntry() {
    return {
      id: uid("hist"),
      fecha: localDateString(),   // FIX #17
      categoria: "pestanas",
      servicio: "",
      tipoPestanas: "",
      curvatura: "",
      grosor: "",
      longitud: "",
      tecnica: "",
      mapping: "",
      productos: "",
      tiempoMinutos: "",
      precio: "",
      observaciones: "",
      retoque: "",
      retiro: "",
    };
  }

  function emptyAppointment() {
    return {
      id: uid("apt"),
      clienteId: "",
      clienteNombre: "",
      fecha: localDateString(),   // FIX #17
      hora: "10:00",
      categoria: "pestanas",
      servicio: "",
      estado: "pendiente",
      notas: "",
    };
  }

  /* ============================================================
     ICONOS
     ============================================================ */
  const Icon = ({ name, size = 18, className = "" }) => {
    const c = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 1.6, strokeLinecap: "round", strokeLinejoin: "round", className };
    switch (name) {
      case "search":      return <svg {...c}><circle cx="10.5" cy="10.5" r="6.5"/><line x1="20" y1="20" x2="15.3" y2="15.3"/></svg>;
      case "plus":        return <svg {...c}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
      case "calendar":    return <svg {...c}><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></svg>;
      case "book":        return <svg {...c}><path d="M4 4.5C4 3.7 4.7 3 5.5 3H12v18H5.5c-.8 0-1.5-.7-1.5-1.5V4.5z"/><path d="M20 4.5c0-.8-.7-1.5-1.5-1.5H12v18h6.5c.8 0 1.5-.7 1.5-1.5V4.5z"/></svg>;
      case "phone":       return <svg {...c}><path d="M5 4h3l2 5-2.5 1.5a11 11 0 0 0 5 5L14 13l5 2v3a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/></svg>;
      case "back":        return <svg {...c}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="11 6 5 12 11 18"/></svg>;
      case "check":       return <svg {...c}><polyline points="20 6 9 17 4 12"/></svg>;
      case "x":           return <svg {...c}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
      case "edit":        return <svg {...c}><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>;
      case "trash":       return <svg {...c}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1.5 14a2 2 0 0 1-2 1.8H8.5a2 2 0 0 1-2-1.8L5 6"/><path d="M10 11v5"/><path d="M14 11v5"/><path d="M9 6V4.5C9 3.7 9.7 3 10.5 3h3c.8 0 1.5.7 1.5 1.5V6"/></svg>;
      case "camera":      return <svg {...c}><path d="M4 8h3l1.5-2.5h7L17 8h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/><circle cx="12" cy="13.5" r="3.5"/></svg>;
      case "lash":        return <svg {...c}><path d="M3 15c2-5 6-8 9-8s7 3 9 8"/><line x1="6" y1="15" x2="5" y2="10.5"/><line x1="9.5" y1="13" x2="9" y2="8.5"/><line x1="13" y1="12" x2="13" y2="7.5"/><line x1="16.5" y1="13" x2="17" y2="8.5"/><line x1="20" y1="15" x2="21" y2="10.5"/></svg>;
      case "lift":        return <svg {...c}><path d="M3 16c2.5-7 6.5-11 9-11s6.5 4 9 11"/></svg>;
      case "brow":        return <svg {...c}><path d="M4 13c2-4 5-6 8-6s6 2 8 6"/></svg>;
      case "wax":         return <svg {...c}><path d="M12 3c3 4 6 7 6 11a6 6 0 0 1-12 0c0-4 3-7 6-11z"/></svg>;
      case "nail":        return <svg {...c}><path d="M9 21V11a3 3 0 0 1 6 0v10"/><path d="M9 21h6"/></svg>;
      case "star":        return <svg {...c}><path d="M12 3l2.6 5.8 6.4.7-4.8 4.3 1.3 6.2L12 16.8 6.5 20l1.3-6.2-4.8-4.3 6.4-.7z"/></svg>;
      case "chevronLeft": return <svg {...c}><polyline points="15 18 9 12 15 6"/></svg>;
      case "chevronRight":return <svg {...c}><polyline points="9 18 15 12 9 6"/></svg>;
      case "alert":       return <svg {...c}><path d="M12 3 2 20h20L12 3z"/><line x1="12" y1="10" x2="12" y2="14.5"/><circle cx="12" cy="17.2" r="0.4" fill="currentColor"/></svg>;
      case "image":       return <svg {...c}><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="M21 16l-5-5-4 4-2-2-5 5"/></svg>;
      case "clock":       return <svg {...c}><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 16 14"/></svg>;
      case "list":        return <svg {...c}><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4.5" cy="6" r="0.8" fill="currentColor"/><circle cx="4.5" cy="12" r="0.8" fill="currentColor"/><circle cx="4.5" cy="18" r="0.8" fill="currentColor"/></svg>;
      default: return null;
    }
  };

  const categoryIcon  = (id) => SERVICE_CATEGORIES.find(c => c.id === id)?.icon  || "star";
  const categoryLabel = (id) => SERVICE_CATEGORIES.find(c => c.id === id)?.label || "Servicio";

  /* ============================================================
     APP PRINCIPAL
     ============================================================ */
  function App() {
    const [view, setView]                 = useState("clientes");
    const [clients, setClients]           = useState([]);
    const [appointments, setAppointments] = useState([]);
    const [loading, setLoading]           = useState(true);
    const [selectedClientId, setSelectedClientId] = useState(null);
    const [toast, setToast]               = useState(null);

    useEffect(() => {
      setClients(storageGet(STORAGE_KEYS.CLIENTS, []));
      setAppointments(storageGet(STORAGE_KEYS.APPOINTMENTS, []));
      setLoading(false);
    }, []);

    const showToast = useCallback((msg) => {
      setToast(msg);
      setTimeout(() => setToast(null), 2400);
    }, []);

    const persistClients = useCallback((next) => {
      // guardar sin fotos inline para no exceder cuota
      const withoutFotos = next.map(c => ({ ...c, fotos: [] }));
      const result = storageSet(STORAGE_KEYS.CLIENTS, withoutFotos);
      if (result === "quota") {
        showToast("⚠️ Espacio lleno. Elimina fotos antiguas.");
      } else if (!result) {
        showToast("No se pudo guardar. Intenta de nuevo.");
      }
      setClients(next);
    }, [showToast]);

    const persistAppointments = useCallback((next) => {
      const result = storageSet(STORAGE_KEYS.APPOINTMENTS, next);
      if (result === "quota") showToast("⚠️ Espacio lleno.");
      else if (!result) showToast("No se pudo guardar.");
      setAppointments(next);
    }, [showToast]);

    const selectedClient = useMemo(
      () => clients.find(c => c.id === selectedClientId) || null,
      [clients, selectedClientId]
    );

    const openClient = (id) => { setSelectedClientId(id); setView("ficha"); };

    if (loading) {
      return (
        <div style={S.loadingScreen}>
          <div style={S.loadingMark}>✦</div>
          <p style={S.loadingText}>Abriendo el estudio…</p>
        </div>
      );
    }

    return (
      <div style={S.app}>
        <Sidebar view={view} setView={setView} clearSelection={() => setSelectedClientId(null)} />

        {/* FIX #3: main sin inline padding — se controla completamente por CSS */}
        <main className="studio-main">
          {view === "clientes" && (
            <ClientList
              clients={clients}
              onOpen={openClient}
              onCreate={(newClient) => {
                const next = [newClient, ...clients];
                persistClients(next);
                showToast("Ficha creada");
                openClient(newClient.id);
              }}
            />
          )}
          {view === "ficha" && selectedClient && (
            <ClientFile
              client={selectedClient}
              onBack={() => setView("clientes")}
              onUpdate={(updated) => {
                const next = clients.map(c => c.id === updated.id ? updated : c);
                persistClients(next);
                // FIX #9: guardar fotos en storage separado
                if (updated.fotos && updated.fotos.length > 0) {
                  const r = savePhotos(updated.id, updated.fotos);
                  if (r === "quota") showToast("⚠️ Sin espacio para fotos. Elimina algunas.");
                }
              }}
              // FIX #22: eliminar appointments huérfanos al borrar cliente
              onDelete={(id) => {
                const nextClients = clients.filter(c => c.id !== id);
                persistClients(nextClients);
                const nextApts = appointments.filter(a => a.clienteId !== id);
                persistAppointments(nextApts);
                setView("clientes");
                showToast("Ficha eliminada");
              }}
              showToast={showToast}
            />
          )}
          {view === "agenda" && (
            <Agenda
              appointments={appointments}
              clients={clients}
              onUpdate={persistAppointments}
              onOpenClient={openClient}
              showToast={showToast}
            />
          )}
        </main>

        {/* Bottom nav para móvil */}
        <nav className="bottom-nav">
          <div className="bottom-nav-inner">
            <button
              className={`bottom-nav-btn ${view === "clientes" || view === "ficha" ? "active" : ""}`}
              onClick={() => { setSelectedClientId(null); setView("clientes"); }}
            >
              <Icon name="book" size={22} />
              Clientas
            </button>
            <button
              className={`bottom-nav-btn ${view === "agenda" ? "active" : ""}`}
              onClick={() => { setSelectedClientId(null); setView("agenda"); }}
            >
              <Icon name="calendar" size={22} />
              Agenda
            </button>
          </div>
        </nav>

        {/* FIX #18: toast con z-index mayor que lightbox (400 > 300) */}
        {toast && <div style={{ ...S.toast, zIndex: 400 }}>{toast}</div>}
      </div>
    );
  }

  /* ============================================================
     SIDEBAR
     ============================================================ */
  function Sidebar({ view, setView, clearSelection }) {
    const items = [
      { id: "clientes", label: "Clientas", icon: "book" },
      { id: "agenda",   label: "Agenda",   icon: "calendar" },
    ];
    return (
      <aside style={S.sidebar} className="studio-sidebar">
        <div style={S.brand}>
          <div style={S.brandMark}>✦</div>
          <div>
            <div style={S.brandTitle}>Estudio</div>
            <div style={S.brandSub}>Fichas &amp; agenda</div>
          </div>
        </div>
        <nav style={S.nav}>
          {items.map(it => (
            <button
              key={it.id}
              onClick={() => { clearSelection(); setView(it.id); }}
              style={{ ...S.navBtn, ...(view === it.id || (view === "ficha" && it.id === "clientes") ? S.navBtnActive : {}) }}
            >
              <Icon name={it.icon} size={17} />
              <span>{it.label}</span>
            </button>
          ))}
        </nav>
        <div style={S.sidebarFoot}>
          <div style={S.foldTabs}>
            {SERVICE_CATEGORIES.slice(0, 5).map(c => (
              <div key={c.id} style={S.foldTab} title={c.label}>
                <Icon name={c.icon} size={13} />
              </div>
            ))}
          </div>
          <p style={S.foldNote}>Preparado para más servicios</p>
        </div>
      </aside>
    );
  }

  /* ============================================================
     LISTA DE CLIENTES
     ============================================================ */
  function ClientList({ clients, onOpen, onCreate }) {
    const [query, setQuery] = useState("");
    const [showNew, setShowNew] = useState(false);

    const filtered = useMemo(() => {
      const q = query.trim().toLowerCase();
      if (!q) return clients;
      return clients.filter(c =>
        c.nombre.toLowerCase().includes(q) ||
        (c.telefono || "").toLowerCase().includes(q)
      );
    }, [clients, query]);

    return (
      <div style={S.page}>
        <header style={S.pageHeader} className="page-header-responsive">
          <div>
            <p style={S.eyebrow}>Tu cartera de clientas</p>
            <h1 style={S.h1}>Fichas</h1>
          </div>
          <button style={S.primaryBtn} onClick={() => setShowNew(true)}>
            <Icon name="plus" size={16} />
            Nueva ficha
          </button>
        </header>

        <div style={S.searchBar}>
          <Icon name="search" size={16} />
          <input
            style={S.searchInput}
            placeholder="Buscar por nombre o teléfono…"
            value={query}
            onChange={e => setQuery(e.target.value)}
            autoFocus
          />
        </div>

        {filtered.length === 0 && (
          <div style={S.emptyState}>
            <Icon name="book" size={28} />
            <p style={S.emptyTitle}>
              {clients.length === 0 ? "Aún no hay fichas creadas" : "No encontramos coincidencias"}
            </p>
            <p style={S.emptyText}>
              {clients.length === 0 ? "Crea la primera ficha para empezar." : "Intenta con otro nombre."}
            </p>
          </div>
        )}

        <div style={S.clientGrid} className="client-grid-responsive">
          {filtered.map(c => (
            <ClientCard key={c.id} client={c} onOpen={() => onOpen(c.id)} />
          ))}
        </div>

        {showNew && (
          <NewClientModal
            onClose={() => setShowNew(false)}
            onSave={client => { setShowNew(false); onCreate(client); }}
          />
        )}
      </div>
    );
  }

  /* ============================================================
     TARJETA DE CLIENTE
     ============================================================ */
  function ClientCard({ client, onOpen }) {
    // FIX #6: última visita siempre es la más reciente por fecha
    const lastVisit = useMemo(() => {
      if (!client.historial.length) return null;
      return [...client.historial].sort((a, b) => b.fecha.localeCompare(a.fecha))[0];
    }, [client.historial]);

    const initials = client.nombre.split(" ").filter(Boolean).slice(0, 2).map(w => w[0]?.toUpperCase()).join("");

    return (
      <button style={S.clientCard} onClick={onOpen}>
        <div style={S.clientAvatar}>{initials || "?"}</div>
        <div style={S.clientCardBody}>
          <div style={S.clientCardName}>{client.nombre || "Sin nombre"}</div>
          <div style={S.clientCardMeta}>
            <Icon name="phone" size={12} />
            <span>{client.telefono || "Sin teléfono"}</span>
          </div>
          {lastVisit ? (
            <div style={S.clientCardLast}>
              Última visita · {formatDate(lastVisit.fecha)} · {categoryLabel(lastVisit.categoria)}
            </div>
          ) : (
            <div style={S.clientCardLastEmpty}>Sin visitas registradas</div>
          )}
          {client.alergias && (
            <div style={S.allergyPill}>
              <Icon name="alert" size={11} />
              Alergias
            </div>
          )}
        </div>
      </button>
    );
  }

  /* ============================================================
     MODAL NUEVA CLIENTE
     ============================================================ */
  function NewClientModal({ onClose, onSave }) {
    const [form, setForm] = useState(emptyClient());
    const set = key => e => setForm({ ...form, [key]: e.target.value });
    const canSave = form.nombre.trim().length > 0;

    return (
      <Modal onClose={onClose} title="Nueva ficha de clienta">
        <div style={S.formGrid} className="form-grid-responsive">
          <Field label="Nombre completo *" htmlFor="nc-nombre">
            <input id="nc-nombre" style={S.input} value={form.nombre} onChange={set("nombre")} autoFocus placeholder="Ej. María Fernanda Ruiz" />
          </Field>
          <Field label="Teléfono" htmlFor="nc-tel">
            <input id="nc-tel" style={S.input} value={form.telefono} onChange={set("telefono")} placeholder="Ej. 04XX-XXXXXXX" />
          </Field>
          <Field label="Fecha de nacimiento" htmlFor="nc-nac">
            <input id="nc-nac" type="date" style={S.input} value={form.fechaNacimiento} onChange={set("fechaNacimiento")} />
          </Field>
          <Field label="Alergias o contraindicaciones" htmlFor="nc-alergia">
            <input id="nc-alergia" style={S.input} value={form.alergias} onChange={set("alergias")} placeholder="Ej. Alergia al pegamento" />
          </Field>
          <Field label="Observaciones" htmlFor="nc-obs" full>
            <textarea id="nc-obs" style={S.textarea} value={form.observaciones} onChange={set("observaciones")} placeholder="Detalles importantes..." />
          </Field>
        </div>
        <div style={S.modalActions}>
          <button style={S.secondaryBtn} onClick={onClose}>Cancelar</button>
          <button style={{ ...S.primaryBtn, opacity: canSave ? 1 : 0.5 }} disabled={!canSave} onClick={() => onSave(form)}>
            <Icon name="check" size={16} />
            Crear ficha
          </button>
        </div>
      </Modal>
    );
  }

  /* ============================================================
     FICHA DE CLIENTE
     ============================================================ */
  function ClientFile({ client, onBack, onUpdate, onDelete, showToast }) {
    const [tab, setTab]               = useState("info");
    const [editingInfo, setEditingInfo] = useState(false);
    const [showNewEntry, setShowNewEntry] = useState(false);
    const [confirmDelete, setConfirmDelete] = useState(false);

    // FIX #9: cargar fotos desde storage separado al montar
    useEffect(() => {
      const savedFotos = loadPhotos(client.id);
      if (savedFotos.length > 0 && client.fotos.length === 0) {
        onUpdate({ ...client, fotos: savedFotos });
      }
    }, [client.id]);

    const sortedHistorial = useMemo(
      () => [...client.historial].sort((a, b) => b.fecha.localeCompare(a.fecha)),
      [client.historial]
    );

    return (
      <div style={S.page}>
        <button style={S.backLink} onClick={onBack}>
          <Icon name="back" size={16} />
          Todas las clientas
        </button>

        {/* FIX #13: file-header-responsive sin margin-top hardcoded */}
        <header className="file-header-wrap">
          <div style={S.fileHeaderLeft}>
            <div style={S.fileAvatar}>
              {client.nombre.split(" ").filter(Boolean).slice(0, 2).map(w => w[0]?.toUpperCase()).join("") || "?"}
            </div>
            <div>
              <h1 style={S.h1}>{client.nombre}</h1>
              <div style={S.fileMetaRow}>
                <Icon name="phone" size={13} />
                <span>{client.telefono || "Sin teléfono"}</span>
              </div>
            </div>
          </div>
          <div style={S.fileHeaderActions}>

  /* ============================================================
     FOTOS PANEL — FIX #9: guardar fotos en storage separado
     ============================================================ */
  function PhotosPanel({ client, onUpdate, showToast }) {
    const fileInputRef   = useRef(null);
    const cameraInputRef = useRef(null);
    const [lightbox, setLightbox]         = useState(null);
    const [confirmDelPhoto, setConfirmDelPhoto] = useState(null);

    const fotos = client.fotos || [];

    const handleFiles = (files) => {
      const arr = Array.from(files).filter(f => f.type.startsWith("image/"));
      if (!arr.length) return;
      let loaded = 0;
      const newFotos = [];
      arr.forEach(file => {
        const reader = new FileReader();
        reader.onload = e => {
          newFotos.push({ id: uid("foto"), dataUrl: e.target.result, nombre: file.name, fecha: localDateString() });
          loaded++;
          if (loaded === arr.length) {
            const next = { ...client, fotos: [...fotos, ...newFotos] };
            onUpdate(next);
            // FIX #9: guardar fotos separado
            const r = savePhotos(client.id, [...fotos, ...newFotos]);
            if (r === "quota") showToast("⚠️ Sin espacio para fotos. Elimina algunas.");
          }
        };
        reader.readAsDataURL(file);
      });
    };

    const deletePhoto = (id) => {
      const updated = fotos.filter(f => f.id !== id);
      onUpdate({ ...client, fotos: updated });
      savePhotos(client.id, updated);
      setConfirmDelPhoto(null);
      if (lightbox?.id === id) setLightbox(null);
    };

    return (
      <div style={{ display: "flex", flexDirection: "column", gap: 16 }}>
        <div style={{ display: "flex", gap: 10, flexWrap: "wrap" }}>
          <button style={S.primaryBtnSm} onClick={() => fileInputRef.current?.click()}>
            <Icon name="image" size={14} />
            Adjuntar foto
          </button>
          <button style={{ ...S.primaryBtnSm, background: COLORS.inkSoft }} onClick={() => cameraInputRef.current?.click()}>
            <Icon name="camera" size={14} />
            Tomar foto
          </button>
          <input ref={fileInputRef}   type="file" accept="image/*" multiple style={{ display: "none" }} onChange={e => { if (e.target.files?.length) { handleFiles(e.target.files); e.target.value = ""; } }} />
          <input ref={cameraInputRef} type="file" accept="image/*" capture="environment" style={{ display: "none" }} onChange={e => { if (e.target.files?.length) { handleFiles(e.target.files); e.target.value = ""; } }} />
        </div>

        {fotos.length === 0 ? (
          <div style={S.emptyState}>
            <Icon name="camera" size={28} />
            <p style={S.emptyTitle}>Sin fotografías</p>
            <p style={S.emptyText}>Adjunta fotos o tómalas con la cámara.</p>
          </div>
        ) : (
          <div style={{ display: "grid", gridTemplateColumns: "repeat(auto-fill, minmax(130px, 1fr))", gap: 10 }}>
            {fotos.map(foto => (
              <div key={foto.id} style={{ position: "relative", borderRadius: 10, overflow: "hidden", background: COLORS.bgAlt, border: `1px solid ${COLORS.border}`, aspectRatio: "1", cursor: "pointer" }}>
                <img src={foto.dataUrl} alt={foto.nombre} style={{ width: "100%", height: "100%", objectFit: "cover" }} onClick={() => setLightbox(foto)} />
                <div style={{ position: "absolute", top: 5, right: 5 }}>
                  <button style={{ ...S.iconBtnDanger, width: 26, height: 26, borderRadius: 7 }} onClick={e => { e.stopPropagation(); setConfirmDelPhoto(foto.id); }}>
                    <Icon name="trash" size={12} />
                  </button>
                </div>
                <div style={{ position: "absolute", bottom: 0, left: 0, right: 0, background: "rgba(43,36,32,.55)", color: "#fff", fontSize: 10, padding: "3px 7px", overflow: "hidden", textOverflow: "ellipsis", whiteSpace: "nowrap" }}>
                  {foto.fecha}
                </div>
              </div>
            ))}
          </div>
        )}

        {confirmDelPhoto && (
          <Modal onClose={() => setConfirmDelPhoto(null)} title="Eliminar foto" narrow>
            <p style={S.confirmText}>¿Eliminar esta fotografía? No se puede deshacer.</p>
            <div style={S.modalActions}>
              <button style={S.secondaryBtn} onClick={() => setConfirmDelPhoto(null)}>Cancelar</button>
              <button style={S.dangerBtn} onClick={() => deletePhoto(confirmDelPhoto)}>Eliminar</button>
            </div>
          </Modal>
        )}

        {lightbox && (
          <div style={{ position: "fixed", inset: 0, background: "rgba(0,0,0,.85)", display: "flex", alignItems: "center", justifyContent: "center", zIndex: 300, padding: 20 }} onClick={() => setLightbox(null)}>
            <div style={{ position: "relative", maxWidth: "90vw", maxHeight: "90vh" }} onClick={e => e.stopPropagation()}>
              <img src={lightbox.dataUrl} alt={lightbox.nombre} style={{ maxWidth: "90vw", maxHeight: "85vh", borderRadius: 12, objectFit: "contain" }} />
              <button style={{ position: "absolute", top: -14, right: -14, width: 34, height: 34, borderRadius: "50%", border: "none", background: COLORS.terracotta, color: "#fff", cursor: "pointer", display: "flex", alignItems: "center", justifyContent: "center" }} onClick={() => setLightbox(null)}>

            </div>
          </div>
        )}
      </div>
    );

  /* ============================================================
     CONSENTIMIENTO — FIX #7: ResizeObserver para canvas
     ============================================================ */
  function ConsentimientoPanel({ client, onUpdate, showToast }) {
    const consent = client.consentimiento || {};
    const [form, setForm] = useState({
      antecedentes:   consent.antecedentes   || "",
      alergias:       consent.alergias       || "",
      lentesContacto: consent.lentesContacto || false,
      claustrofobia:  consent.claustrofobia  || false,
      excesoPestanas: consent.excesoPestanas || false,
      lagrimalSeco:   consent.lagrimalSeco   || false,
      cataratas:      consent.cataratas      || false,
      vertigo:        consent.vertigo        || false,
      otros:          consent.otros          || "",
      firmadoEn:      consent.firmadoEn      || null,
      firmaDataUrl:   consent.firmaDataUrl   || null,
    });
    const [signed, setSigned]   = useState(!!consent.firmaDataUrl);
    const [drawing, setDrawing] = useState(false);
    const canvasRef  = useRef(null);
    const lastPos    = useRef(null);
    const points     = useRef([]);
    const roRef      = useRef(null);    // ResizeObserver ref

    const setField = key => e => setForm({ ...form, [key]: e.target.type === "checkbox" ? e.target.checked : e.target.value });

    const getPos = (e, canvas) => {
      const rect = canvas.getBoundingClientRect();
      const src  = e.touches ? e.touches[0] : e;
      return { x: src.clientX - rect.left, y: src.clientY - rect.top };
    };

    const drawBaseline = (ctx, w) => {
      ctx.beginPath();
      ctx.moveTo(30, 165);
      ctx.lineTo(w - 30, 165);
      ctx.strokeStyle = "#E7DDD2";
      ctx.lineWidth = 1.5;
      ctx.stroke();
    };

    // FIX #7: inicializar canvas y observar cambios de tamaño
    const initCanvas = useCallback(() => {
      const canvas = canvasRef.current;
      if (!canvas) return;
      const dpr  = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      if (rect.width === 0) { setTimeout(initCanvas, 50); return; }
      canvas.width  = Math.round(rect.width * dpr);
      canvas.height = Math.round(200 * dpr);
      const ctx = canvas.getContext("2d");
      ctx.setTransform(1, 0, 0, 1, 0, 0);
      ctx.scale(dpr, dpr);
      drawBaseline(ctx, rect.width);
      if (form.firmaDataUrl) {
        const img = new Image();
        img.onload = () => ctx.drawImage(img, 0, 0, rect.width, 200);
        img.src    = form.firmaDataUrl;
      }
    }, []);

    useEffect(() => {
      setTimeout(initCanvas, 30);
      // FIX #7: observer para re-escalar canvas al cambiar tamaño
      if (window.ResizeObserver && canvasRef.current) {
        roRef.current = new ResizeObserver(() => initCanvas());
        roRef.current.observe(canvasRef.current.parentElement);
      }
      return () => { if (roRef.current) roRef.current.disconnect(); };
    }, [initCanvas]);

    const startDraw = e => {
      e.preventDefault(); setDrawing(true);
      const canvas = canvasRef.current;
      const pos = getPos(e, canvas);
      lastPos.current = pos; points.current = [pos];
      const ctx = canvas.getContext("2d");
      ctx.beginPath(); ctx.arc(pos.x, pos.y, 1.2, 0, Math.PI * 2);
      ctx.fillStyle = COLORS.ink; ctx.fill();
    };

    const draw = e => {
      e.preventDefault(); if (!drawing) return;
      const canvas = canvasRef.current;
      const ctx = canvas.getContext("2d");
      const pos = getPos(e, canvas);
      points.current.push(pos);
      const pts = points.current;
      if (pts.length < 3) {
        ctx.beginPath(); ctx.moveTo(lastPos.current.x, lastPos.current.y); ctx.lineTo(pos.x, pos.y);
        ctx.strokeStyle = COLORS.ink; ctx.lineWidth = 2.2; ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.stroke();
      } else {
        const i = pts.length - 1;
        const midX = (pts[i-1].x + pts[i].x) / 2;
        const midY = (pts[i-1].y + pts[i].y) / 2;
        ctx.beginPath();
        ctx.moveTo((pts[i-2].x + pts[i-1].x)/2, (pts[i-2].y + pts[i-1].y)/2);
        ctx.quadraticCurveTo(pts[i-1].x, pts[i-1].y, midX, midY);
        ctx.strokeStyle = COLORS.ink; ctx.lineWidth = 2.2; ctx.lineCap = "round"; ctx.lineJoin = "round"; ctx.stroke();
      }
      lastPos.current = pos;
    };

    const endDraw = e => { e.preventDefault(); setDrawing(false); lastPos.current = null; points.current = []; };

    const clearCanvas = () => {
      const canvas = canvasRef.current;
      const ctx = canvas.getContext("2d");
      const dpr = window.devicePixelRatio || 1;
      ctx.setTransform(1,0,0,1,0,0);
      ctx.clearRect(0, 0, canvas.width, canvas.height);
      ctx.scale(dpr, dpr);
      drawBaseline(ctx, canvas.getBoundingClientRect().width);
      setSigned(false);
    };

    const saveConsent = () => {
      const canvas = canvasRef.current;
      const dataUrl = canvas.toDataURL("image/png");
      const blank = document.createElement("canvas");
      blank.width = canvas.width; blank.height = canvas.height;
      const isEmpty = dataUrl === blank.toDataURL("image/png");
      const updatedForm = { ...form, firmaDataUrl: isEmpty ? null : dataUrl, firmadoEn: isEmpty ? null : new Date().toISOString() };
      setSigned(!isEmpty);
      onUpdate({ ...client, consentimiento: updatedForm });
      showToast("Consentimiento guardado");
    };

  /* ============================================================
     AGENDA — FIX #4: navegación prev/next entre semanas/días
             FIX #16: cursor basado en fecha local
     ============================================================ */
  function Agenda({ appointments, clients, onUpdate, onOpenClient, showToast }) {
    const [mode, setMode]     = useState("semana");
    const [cursor, setCursor] = useState(() => {
      // FIX #16: fecha local sin desfase UTC
      const d = new Date();
      d.setHours(0, 0, 0, 0);
      return d;
    });
    const [showNew, setShowNew] = useState(false);
    const [editing, setEditing] = useState(null);

    const days = useMemo(() => {
      if (mode === "dia") return [new Date(cursor)];
      const start = startOfWeek(cursor);
      return Array.from({ length: 7 }, (_, i) => addDays(start, i));
    }, [mode, cursor]);

    // FIX #4: navegar entre semanas/días
    const navigate = (dir) => {
      setCursor(prev => {
        const next = new Date(prev);
        if (mode === "dia")    next.setDate(next.getDate() + dir);
        else                   next.setDate(next.getDate() + dir * 7);
        return next;
      });
    };

    const appsByDay = useMemo(() => {
      const map = {};
      for (const d of days) map[dateKey(d)] = [];
      for (const a of appointments) {
        if (map[a.fecha] !== undefined) map[a.fecha].push(a);
      }
      return map;
    }, [appointments, days]);

    return (
      <div style={S.page}>
        <header style={S.pageHeader} className="page-header-responsive">
          <div>
            <p style={S.eyebrow}>Tu semana de trabajo</p>
            <h1 style={S.h1}>Agenda</h1>
          </div>
          <button style={S.primaryBtn} onClick={() => setShowNew(true)}><Icon name="plus" size={16} />Nueva cita</button>
        </header>

        {/* FIX #4: controles de navegación */}
        <div style={S.agendaToolbar}>
          <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
            <button style={S.navArrowBtn} onClick={() => navigate(-1)} title="Anterior">
              <Icon name="chevronLeft" size={16} />
            </button>
            <span style={S.agendaRangeLabel}>{rangeLabel(days, mode)}</span>
            <button style={S.navArrowBtn} onClick={() => navigate(1)} title="Siguiente">
              <Icon name="chevronRight" size={16} />
            </button>
            <button style={{ ...S.navArrowBtn, fontSize: 11, padding: "6px 10px", borderRadius: 8 }} onClick={() => { const d = new Date(); d.setHours(0,0,0,0); setCursor(d); }} title="Hoy">
              Hoy
            </button>
          </div>
          <div style={S.modeToggle}>
            <button style={{ ...S.modeBtn, ...(mode === "dia"    ? S.modeBtnActive : {}) }} onClick={() => setMode("dia")}>Día</button>
            <button style={{ ...S.modeBtn, ...(mode === "semana" ? S.modeBtnActive : {}) }} onClick={() => setMode("semana")}>Semana</button>
          </div>
        </div>

        <div className="agenda-scroll">
          <div style={{ ...S.agendaGrid, gridTemplateColumns: `repeat(${days.length}, 1fr)` }} className="agenda-week-min">
            {days.map(d => {
              const key    = dateKey(d);
              const dayApts = appsByDay[key] || [];
              const isToday = dateKey(d) === localDateString();
              return (
                <div key={key} style={S.agendaCol}>
                  <div style={{ ...S.agendaColHeader, ...(isToday ? { background: COLORS.bgAlt, borderColor: COLORS.terracotta } : {}) }}>
                    <span style={{ fontSize: 11, color: isToday ? COLORS.terracottaDark : COLORS.inkSoft, fontWeight: isToday ? 700 : 400 }}>{weekdayLabel(d)}</span>
                    <strong style={{ color: isToday ? COLORS.terracottaDark : COLORS.ink }}>{d.getDate()}</strong>
                  </div>
                  <div style={S.agendaColBody}>
                    {dayApts.length === 0 && <p style={S.agendaEmptyDay}>Sin citas</p>}
                    {dayApts.sort((a, b) => a.hora.localeCompare(b.hora)).map(a => (
                      <AppointmentCard
                        key={a.id}
                        apt={a}
                        onEdit={() => setEditing(a)}
                        onOpenClient={() => a.clienteId && onOpenClient(a.clienteId)}
                        onCancel={id => { onUpdate(appointments.map(x => x.id === id ? { ...x, estado: "cancelada" } : x)); showToast("Cita cancelada"); }}
                        onDelete={id => { onUpdate(appointments.filter(x => x.id !== id)); showToast("Cita eliminada"); }}
                      />
                    ))}
                  </div>
                </div>
              );
            })}
          </div>
        </div>

        {showNew && (
          <AppointmentModal
            clients={clients}
            initial={{ ...emptyAppointment(), fecha: dateKey(cursor) }}
            onClose={() => setShowNew(false)}
            onSave={apt => { onUpdate([...appointments, apt]); setShowNew(false); showToast("Cita agendada"); }}
          />
        )}
        {editing && (
          <AppointmentModal
            clients={clients}
            initial={editing}
            editing
            onClose={() => setEditing(null)}
            onSave={apt => { onUpdate(appointments.map(x => x.id === apt.id ? apt : x)); setEditing(null); showToast("Actualizada"); }}
          />
        )}
      </div>
    );
  }

  /* ============================================================
     HELPERS — FIX #15 #16: formatDate robusto, fechas locales
     ============================================================ */
  function dateKey(d) {
    const y   = d.getFullYear();
    const m   = String(d.getMonth() + 1).padStart(2, "0");
    const day = String(d.getDate()).padStart(2, "0");
    return `${y}-${m}-${day}`;
  }

  function startOfWeek(d) {
    const date = new Date(d);
    date.setDate(date.getDate() - date.getDay());
    date.setHours(0, 0, 0, 0);
    return date;
  }

  function addDays(d, n) {
    const date = new Date(d);
    date.setDate(date.getDate() + n);
    return date;
  }

  function weekdayLabel(d) {
    return d.toLocaleDateString("es-ES", { weekday: "short" }).replace(".", "");
  }

  function rangeLabel(days, mode) {
    if (mode === "dia") return days[0].toLocaleDateString("es-ES", { weekday: "long", day: "numeric", month: "long" });
    return `${days[0].getDate()} – ${days[6].getDate()} de ${days[6].toLocaleDateString("es-ES", { month: "long" })}`;
  }

  // FIX #15: formatDate maneja strings ISO con y sin hora correctamente
  function formatDate(iso) {
    if (!iso) return "";
    // Si ya es YYYY-MM-DD (10 chars) añadimos mediodía para evitar desfase UTC
    const normalized = iso.length === 10 ? iso + "T12:00:00" : iso;
    const d = new Date(normalized);
    if (isNaN(d.getTime())) return iso;

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose:       #C9907A;
    --rose-deep:  #9B4F6A;
    --rose-light: #E8B4A0;
    --gold:       #D4AF7A;
    --gold-light: #EDD9A3;
    --gold-deep:  #B8923A;
    --pearl:      #FDF8F5;
    --blush:      #F7ECEE;
    --blush-mid:  #EDD9DE;
    --charcoal:   #2A1F2D;
    --ink:        #3D2B3D;
    --ink-soft:   #7A5C6E;
    --ink-muted:  #A8879A;
    --white:      #FFFFFF;
    --border:     #EDD9DE;
    --danger:     #9B3A4F;
    --shadow-sm:  0 2px 12px rgba(155,79,106,.10);
    --shadow-md:  0 8px 32px rgba(155,79,106,.14);
    --shadow-lg:  0 20px 60px rgba(155,79,106,.18);
    --radius-sm:  8px;
    --radius-md:  14px;
    --radius-lg:  20px;
    --radius-xl:  28px;
  }

  html { font-size: 15px; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--pearl);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  /* ── SCROLLBAR ── */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--blush-mid); border-radius: 99px; }

  /* ── LAYOUT ── */
  #root { display: flex; min-height: 100vh; }

  .sidebar {
    width: 250px;
    flex-shrink: 0;
    background: linear-gradient(180deg, var(--rose-deep) 0%, #6B2D4A 100%);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: hidden;
  }

  .sidebar::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 10%, rgba(212,175,122,.22) 0%, transparent 60%),
      radial-gradient(ellipse at 80% 90%, rgba(201,144,122,.18) 0%, transparent 60%);
    pointer-events: none;
  }

  .sidebar-inner {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 32px 20px;
  }

  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 40px;
    text-align: center;
  }

  .brand-monogram {
    width: 62px;
    height: 62px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 50%, var(--gold) 100%);
    background-size: 200% 200%;
    animation: shimmer 3s ease-in-out infinite;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 24px;
    font-weight: 700;
    color: var(--rose-deep);
    margin-bottom: 14px;
    box-shadow: 0 4px 20px rgba(212,175,122,.4);
  }

  @keyframes shimmer {
    0%   { background-position: 0% 50%; }
    50%  { background-position: 100% 50%; }
    100% { background-position: 0% 50%; }
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 18px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: .5px;
    line-height: 1.2;
  }

  .brand-tagline {
    font-size: 10.5px;
    color: rgba(255,255,255,.55);
    margin-top: 4px;
    letter-spacing: 1.8px;
    text-transform: uppercase;
  }

  .brand-divider {
    width: 48px;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--gold), transparent);
    margin: 14px auto 0;
    animation: glow-line 3s ease-in-out infinite;
  }

  @keyframes glow-line {
    0%, 100% { opacity: .5; }
    50%       { opacity: 1; }
  }

  /* ── NAV ── */
  .sidebar-nav { display: flex; flex-direction: column; gap: 6px; }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-radius: var(--radius-md);
    border: none;
    background: transparent;
    color: rgba(255,255,255,.6);
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s ease;
    text-align: left;
  }

  .nav-btn:hover {
    background: rgba(255,255,255,.08);
    color: rgba(255,255,255,.9);
  }

  .nav-btn.active {
    background: rgba(255,255,255,.14);
    color: var(--white);
    font-weight: 600;
  }

  .nav-btn.active .nav-icon-wrap {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--rose-deep);
  }

  .nav-icon-wrap {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,.08);
    flex-shrink: 0;
    transition: all .2s ease;
  }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 20px;
    border-top: 1px solid rgba(255,255,255,.1);
    text-align: center;
  }

  .sidebar-footer-gems {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 8px;
  }

  .gem { font-size: 14px; opacity: .5; animation: pulse-gem 2.5s ease-in-out infinite; }
  .gem:nth-child(2) { animation-delay: .4s; }
  .gem:nth-child(3) { animation-delay: .8s; }

  @keyframes pulse-gem {
    0%, 100% { opacity: .4; transform: scale(1); }
    50%       { opacity: .9; transform: scale(1.1); }
  }

  .sidebar-footer-text { font-size: 10px; color: rgba(255,255,255,.3); letter-spacing: 1px; text-transform: uppercase; }

  /* ── MAIN ── */
  .main-content {
    flex: 1;
    min-width: 0;
    padding: 40px 44px 80px;
    max-width: 1120px;
    margin: 0 auto;
    width: 100%;
  }

  /* ── PAGE ANIMATIONS ── */
  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @keyframes fadeIn {
    from { opacity: 0; }
    to   { opacity: 1; }
  }

  .animate-in {
    animation: fadeUp .4s cubic-bezier(.22,.68,0,1.2) forwards;
  }

  .stagger-1 { animation-delay: .05s; opacity: 0; }
  .stagger-2 { animation-delay: .12s; opacity: 0; }
  .stagger-3 { animation-delay: .19s; opacity: 0; }
  .stagger-4 { animation-delay: .26s; opacity: 0; }
  .stagger-5 { animation-delay: .33s; opacity: 0; }

  /* ── PAGE HEADER ── */
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 30px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .page-eyebrow {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold-deep);
    margin-bottom: 6px;
  }

  .page-title {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--charcoal);
    line-height: 1.1;
  }

  /* ── BUTTONS ── */
  .btn-primary {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 12px 22px;
    border-radius: var(--radius-md);
    border: none;
    background: linear-gradient(135deg, var(--rose-deep) 0%, var(--rose) 100%);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s ease;
    box-shadow: 0 4px 16px rgba(155,79,106,.30);
    white-space: nowrap;
  }

  .btn-primary:hover {
    transform: translateY(-1px);
    box-shadow: 0 8px 24px rgba(155,79,106,.38);
  }

  .btn-primary:active { transform: translateY(0); }

  .btn-primary-sm {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 16px;
    border-radius: var(--radius-sm);
    border: none;
    background: linear-gradient(135deg, var(--rose-deep), var(--rose));
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 12.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s ease;
    box-shadow: 0 3px 10px rgba(155,79,106,.25);
    white-space: nowrap;
  }

  .btn-primary-sm:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(155,79,106,.32); }

  .btn-ghost {
    padding: 12px 20px;
    border-radius: var(--radius-md);
    border: 1.5px solid var(--border);
    background: transparent;
    color: var(--ink-soft);
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s ease;
  }

  .btn-ghost:hover { border-color: var(--rose-light); color: var(--rose-deep); background: var(--blush); }

  .btn-danger {
    padding: 12px 22px;
    border-radius: var(--radius-md);
    border: none;
    background: var(--danger);
    color: #fff;
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 600;
    cursor: pointer;
    transition: all .2s ease;
  }

  .btn-danger:hover { background: #7A2E3F; transform: translateY(-1px); }

  .btn-icon {
    width: 38px;
    height: 38px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--ink-soft);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    transition: all .2s ease;
    flex-shrink: 0;
  }

  .btn-icon:hover { border-color: var(--rose-light); color: var(--rose-deep); background: var(--blush); }

  .btn-icon-danger {
    width: 38px; height: 38px;
    border-radius: var(--radius-sm);
    border: 1.5px solid #F2D0D8;
    background: #FDF0F3;
    color: var(--danger);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all .2s ease;
    flex-shrink: 0;
  }

  .btn-icon-danger:hover { background: #F8DDE3; }

  /* ── SEARCH BAR ── */
  .search-wrap {
    display: flex;
    align-items: center;
    gap: 12px;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 13px 18px;
    margin-bottom: 24px;
    transition: border-color .2s;
    box-shadow: var(--shadow-sm);
  }

  .search-wrap:focus-within { border-color: var(--rose-light); box-shadow: 0 0 0 3px rgba(201,144,122,.12); }

  .search-input {
    flex: 1; border: none; outline: none;
    font-family: 'Inter', sans-serif;
    font-size: 14px; background: transparent; color: var(--ink);
  }

  .search-input::placeholder { color: var(--ink-muted); }

  /* ── CARDS ── */
  .card {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    box-shadow: var(--shadow-sm);
    transition: box-shadow .2s, transform .2s, border-color .2s;
  }

  .card:hover { box-shadow: var(--shadow-md); }

  /* ── CLIENT GRID ── */
  .client-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(290px, 1fr));
    gap: 16px;
  }

  .client-card-btn {
    width: 100%;
    text-align: left;
    font-family: inherit;
    cursor: pointer;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 20px;
    display: flex;
    gap: 16px;
    box-shadow: var(--shadow-sm);
    transition: all .22s ease;
    animation: fadeUp .35s ease both;
  }

  .client-card-btn:hover {
    border-color: var(--rose-light);
    box-shadow: var(--shadow-md);
    transform: translateY(-2px);
  }

  .client-avatar {
    width: 52px;
    height: 52px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold) 0%, var(--rose) 100%);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 17px;
    font-weight: 700;
    flex-shrink: 0;
    box-shadow: 0 3px 12px rgba(155,79,106,.25);
  }

  .client-card-name { font-size: 15.5px; font-weight: 600; color: var(--charcoal); margin-bottom: 4px; }
  .client-card-meta { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--ink-soft); }
  .client-card-last { font-size: 11.5px; color: var(--ink-muted); margin-top: 6px; }

  .allergy-pill {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    margin-top: 8px;
    font-size: 10.5px;
    font-weight: 700;
    color: var(--danger);
    background: #FDF0F3;
    border: 1px solid #F2D0D8;
    padding: 3px 9px;
    border-radius: 99px;
    letter-spacing: .3px;
  }

  /* ── GOLD DIVIDER ── */
  .gold-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, var(--gold-light) 30%, var(--gold) 50%, var(--gold-light) 70%, transparent 100%);
    margin: 6px 0;
  }

  /* ── TABS ── */
  .tabs-bar {
    display: flex;
    gap: 2px;
    background: var(--blush);
    border-radius: var(--radius-md);
    padding: 4px;
    margin-bottom: 24px;
    overflow-x: auto;
    scrollbar-width: none;
    -webkit-overflow-scrolling: touch;
  }

  .tabs-bar::-webkit-scrollbar { display: none; }

  .tab-btn {
    display: flex;
    align-items: center;
    gap: 7px;
    padding: 9px 16px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--ink-soft);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all .18s ease;
  }

  .tab-btn:hover { color: var(--rose-deep); }

  .tab-btn.active {
    background: var(--white);
    color: var(--rose-deep);
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(155,79,106,.12);
  }

  /* ── PANEL CARD ── */
  .panel {
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 24px;
    box-shadow: var(--shadow-sm);
  }

  .panel-label {
    font-size: 10px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    color: var(--gold-deep);
    margin-bottom: 10px;
  }

  /* ── HISTORY TIMELINE ── */
  .timeline { display: flex; flex-direction: column; gap: 0; }

  .hist-card {
    display: flex;
    gap: 16px;
    padding-bottom: 24px;
    position: relative;
    animation: fadeUp .3s ease both;
  }

  .hist-line {
    position: absolute;
    left: 16px;
    top: 34px;
    bottom: 0;
    width: 1px;
    background: linear-gradient(180deg, var(--border), transparent);
  }

  .hist-dot {
    width: 34px;
    height: 34px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--blush), var(--blush-mid));
    border: 2px solid var(--border);
    color: var(--rose-deep);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 1;
    flex-shrink: 0;
  }

  .hist-content {
    flex: 1;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 16px 18px;
    box-shadow: var(--shadow-sm);
    transition: box-shadow .2s;
  }

  .hist-content:hover { box-shadow: var(--shadow-md); }

  .hist-date { font-size: 11px; font-weight: 600; color: var(--ink-muted); letter-spacing: .5px; }
  .hist-service { font-size: 16px; font-weight: 600; font-family: 'Playfair Display', serif; color: var(--charcoal); margin-top: 2px; }

  .price-badge {
    font-size: 12.5px;
    font-weight: 700;
    color: var(--rose-deep);
    background: linear-gradient(135deg, var(--blush) 0%, #F5DDE2 100%);
    border: 1px solid var(--blush-mid);
    padding: 4px 12px;
    border-radius: 99px;
  }

  .detail-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
    gap: 10px;
    margin-top: 14px;
  }

  .detail-item { display: flex; flex-direction: column; gap: 2px; }
  .detail-label { font-size: 10px; font-weight: 600; color: var(--ink-muted); text-transform: uppercase; letter-spacing: .8px; }
  .detail-value { font-size: 13.5px; font-weight: 500; color: var(--ink); }

  .obs-box {
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--blush);
    border-radius: var(--radius-sm);
    font-size: 13px;
    color: var(--ink-soft);
    line-height: 1.6;
    border-left: 3px solid var(--rose-light);
  }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed;
    inset: 0;
    background: rgba(42,31,45,.5);
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 20px;
    z-index: 200;
    animation: fadeIn .18s ease;
  }

  .modal-card {
    background: var(--pearl);
    border-radius: var(--radius-xl);
    width: 100%;
    max-width: 500px;
    max-height: 90vh;
    display: flex;
    flex-direction: column;
    box-shadow: var(--shadow-lg);
    animation: scaleIn .22s cubic-bezier(.22,.68,0,1.2);
    border: 1.5px solid var(--border);
  }

  .modal-card.wide { max-width: 660px; }
  .modal-card.narrow { max-width: 400px; }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(.94) translateY(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 22px 28px;
    border-bottom: 1.5px solid var(--border);
    flex-shrink: 0;
  }

  .modal-title {
    font-family: 'Playfair Display', serif;
    font-size: 20px;
    font-weight: 700;
    color: var(--charcoal);
  }

  .modal-close {
    width: 34px; height: 34px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--ink-soft);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all .18s;
  }

  .modal-close:hover { border-color: var(--rose-light); color: var(--rose-deep); background: var(--blush); }

  .modal-body { padding: 24px 28px; overflow-y: auto; flex: 1; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 28px 24px; flex-shrink: 0; border-top: 1.5px solid var(--border); }

  /* ── FORM ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .form-grid.single { grid-template-columns: 1fr; }
  .field-full { grid-column: 1 / -1; }

  .field { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 11.5px; font-weight: 600; color: var(--ink-soft); letter-spacing: .3px; }

  .input-field {
    padding: 11px 14px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    color: var(--ink);
    background: var(--white);
    outline: none;
    transition: border-color .18s, box-shadow .18s;
    width: 100%;
  }

  .input-field:focus {
    border-color: var(--rose-light);
    box-shadow: 0 0 0 3px rgba(201,144,122,.12);
  }

  .input-field::placeholder { color: var(--ink-muted); }

  textarea.input-field { min-height: 76px; resize: vertical; }

  select.input-field { cursor: pointer; }

  /* ── EMPTY STATE ── */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    text-align: center;
    padding: 56px 24px;
    background: var(--white);
    border: 1.5px dashed var(--border);
    border-radius: var(--radius-xl);
    gap: 8px;
    color: var(--ink-muted);
  }

  .empty-icon { font-size: 32px; margin-bottom: 4px; opacity: .6; }
  .empty-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; color: var(--ink); margin: 0; }
  .empty-text  { font-size: 13.5px; color: var(--ink-muted); max-width: 280px; }

  /* ── AGENDA ── */
  .agenda-toolbar {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 22px;
    flex-wrap: wrap;
    gap: 12px;
  }

  .nav-date-controls { display: flex; align-items: center; gap: 8px; }

  .btn-nav-arrow {
    width: 36px; height: 36px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--ink-soft);
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: all .18s;
    box-shadow: var(--shadow-sm);
  }

  .btn-nav-arrow:hover { border-color: var(--rose-light); color: var(--rose-deep); background: var(--blush); }

  .date-range-label {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 600;
    color: var(--charcoal);
    min-width: 140px;
    text-align: center;
  }

  .btn-today {
    padding: 7px 14px;
    border-radius: var(--radius-sm);
    border: 1.5px solid var(--border);
    background: var(--white);
    color: var(--ink-soft);
    font-family: 'Inter', sans-serif;
    font-size: 12px;
    font-weight: 600;
    cursor: pointer;
    transition: all .18s;
    box-shadow: var(--shadow-sm);
  }

  .btn-today:hover { border-color: var(--rose-light); color: var(--rose-deep); background: var(--blush); }

  .mode-toggle {
    display: flex;
    background: var(--blush);
    border-radius: var(--radius-md);
    padding: 4px;
  }

  .mode-btn {
    padding: 7px 16px;
    border-radius: var(--radius-sm);
    border: none;
    background: transparent;
    color: var(--ink-soft);
    font-family: 'Inter', sans-serif;
    font-size: 13px;
    font-weight: 500;
    cursor: pointer;
    transition: all .18s;
  }

  .mode-btn.active {
    background: var(--white);
    color: var(--rose-deep);
    font-weight: 600;
    box-shadow: 0 2px 8px rgba(155,79,106,.12);
  }

  .agenda-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }

  .agenda-grid {
    display: grid;
    gap: 10px;
    min-width: 580px;
  }

  .agenda-col-header {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 10px 4px;
    border-radius: var(--radius-sm);
    background: var(--white);
    border: 1.5px solid var(--border);
    margin-bottom: 8px;
  }

  .agenda-col-header.today {
    background: var(--blush);
    border-color: var(--rose);
  }

  .agenda-col-header.today .col-day { color: var(--rose-deep); font-weight: 700; }
  .agenda-col-header.today .col-num { color: var(--rose-deep); }

  .col-day { font-size: 10.5px; color: var(--ink-muted); text-transform: uppercase; letter-spacing: 1px; }
  .col-num { font-size: 18px; font-weight: 700; color: var(--charcoal); font-family: 'Playfair Display', serif; }

  .apt-card {
    border-radius: var(--radius-md);
    padding: 12px 13px;
    border: 1.5px solid;
    display: flex;
    flex-direction: column;
    gap: 4px;
    transition: box-shadow .2s;
    animation: fadeUp .3s ease both;
  }

  .apt-card:hover { box-shadow: var(--shadow-md); }

  .apt-card.normal { background: #FFF8FB; border-color: var(--blush-mid); }
  .apt-card.cancelada { background: #F9F5F5; border-color: #E8D0D0; opacity: .75; }

  .apt-time { font-size: 11px; font-weight: 700; color: var(--rose-deep); }
  .apt-client { font-weight: 600; font-size: 13px; color: var(--charcoal); background: none; border: none; font-family: inherit; cursor: pointer; padding: 0; text-align: left; }
  .apt-client:hover { color: var(--rose-deep); }
  .apt-service { font-size: 11.5px; color: var(--ink-muted); }

  /* ── CLIENT FILE HEADER ── */
  .file-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-start;
    gap: 16px;
    flex-wrap: wrap;
    margin-bottom: 8px;
  }

  .file-header-left { display: flex; gap: 18px; align-items: center; }

  .file-avatar {
    width: 64px;
    height: 64px;
    border-radius: 50%;
    background: linear-gradient(135deg, var(--gold) 0%, var(--rose) 100%);
    color: #fff;
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Playfair Display', serif;
    font-size: 22px;
    font-weight: 700;
    box-shadow: 0 4px 16px rgba(155,79,106,.28);
    flex-shrink: 0;
  }

  .allergy-banner {
    display: flex;
    align-items: center;
    gap: 10px;
    background: #FDF0F3;
    border: 1.5px solid #F2D0D8;
    color: #7A2E3F;
    padding: 12px 18px;
    border-radius: var(--radius-md);
    font-size: 13.5px;
    margin-bottom: 8px;
  }

  /* ── PHOTO GRID ── */
  .photo-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(138px, 1fr));
    gap: 12px;
  }

  .photo-thumb {
    position: relative;
    border-radius: var(--radius-md);
    overflow: hidden;
    aspect-ratio: 1;
    background: var(--blush);
    border: 1.5px solid var(--border);
    cursor: pointer;
    transition: transform .2s, box-shadow .2s;
  }

  .photo-thumb:hover { transform: scale(1.02); box-shadow: var(--shadow-md); }

  .photo-thumb img { width: 100%; height: 100%; object-fit: cover; display: block; }

  .photo-date {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    background: linear-gradient(transparent, rgba(42,31,45,.65));
    color: #fff;
    font-size: 10px;
    padding: 16px 8px 6px;
    text-align: center;
  }

  .photo-del {
    position: absolute;
    top: 6px; right: 6px;
    width: 28px; height: 28px;
    border-radius: 8px;
    border: none;
    background: rgba(155,58,79,.85);
    color: #fff;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    opacity: 0;
    transition: opacity .18s;
    backdrop-filter: blur(4px);
  }

  .photo-thumb:hover .photo-del { opacity: 1; }

  /* ── SIGNATURE CANVAS ── */
  .canvas-wrap {
    border-radius: var(--radius-md);
    overflow: hidden;
    border: 1.5px solid var(--border);
    background: var(--white);
    position: relative;
  }

  /* ── TOAST ── */
  .toast {
    position: fixed;
    bottom: 100px;
    left: 50%;
    transform: translateX(-50%);
    background: var(--charcoal);
    color: #fff;
    padding: 12px 24px;
    border-radius: 99px;
    font-size: 13.5px;
    font-weight: 600;
    z-index: 500;
    animation: toastIn .25s cubic-bezier(.22,.68,0,1.2);
    white-space: nowrap;
    box-shadow: 0 8px 30px rgba(42,31,45,.3);
    border: 1px solid rgba(255,255,255,.1);
  }

  @keyframes toastIn {
    from { opacity: 0; transform: translateX(-50%) translateY(12px); }
    to   { opacity: 1; transform: translateX(-50%) translateY(0); }
  }

  /* ── BOTTOM NAV ── */
  .bottom-nav {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: var(--white);
    border-top: 1.5px solid var(--border);
    z-index: 100;
    padding: 6px 0 env(safe-area-inset-bottom, 6px);
  }

  .bottom-nav-inner { display: flex; justify-content: space-around; }

  .bottom-nav-btn {
    display: flex; flex-direction: column; align-items: center; gap: 3px;
    background: none; border: none; cursor: pointer;
    padding: 8px 24px;
    font-size: 10.5px;
    font-weight: 600;
    color: var(--ink-muted);
    font-family: 'Inter', sans-serif;
    transition: color .18s;

  .bottom-nav-btn.active { color: var(--rose-deep); }

  /* ── CONFIRM INLINE ── */
  .inline-confirm {

    gap: 14px;
    align-items: center;
    margin-top: 12px;
    padding-top: 12px;
