<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Estudio Lash & Brow - Sistema</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 text-gray-900">

    <div id="root"></div>

    <script type="text/babel">
        // Extraemos los Hooks directamente del objeto global de React
        const { useState, useEffect, useMemo, useCallback } = React;

        /* ============================================================
           UTILIDADES DE ALMACENAMIENTO (LOCALSTORAGE CORREGIDO)
           ============================================================ */
        const STORAGE_KEYS = {
          CLIENTS: "studio:clients",
          APPOINTMENTS: "studio:appointments",
        };

        function storageGet(key, fallback) {
          try {
            const res = localStorage.getItem(key);
            if (!res) return fallback;
            return JSON.parse(res);
          } catch (e) {
            return fallback;
          }
        }

        function storageSet(key, value) {
          try {
            localStorage.setItem(key, JSON.stringify(value));
            return true;
          } catch (e) {
            console.error("Error guardando", key, e);
            return false;
          }
        }

        /* ============================================================
           DATOS BASE
           ============================================================ */
        const SERVICE_CATEGORIES = [
          { id: "pestanas", label: "Extensión de pestañas", icon: "lash" },
          { id: "lifting", label: "Lifting de pestañas", icon: "lift" },
          { id: "laminado", label: "Laminado de cejas", icon: "brow" },
          { id: "depilacion", label: "Depilación", icon: "wax" },
          { id: "unas", label: "Uñas", icon: "nail" },
          { id: "otro", label: "Otro servicio", icon: "star" },
        ];

        const CURVATURAS = ["B", "C", "CC", "D", "DD", "L", "L+", "M"];
        const GROSORES = ["0.03", "0.05", "0.07", "0.10", "0.12", "0.15", "0.18", "0.20", "0.25"];
        const TECNICAS = ["Clásicas","2D","3D","Híbrida","Rimel","Rimel Teach","Griegas","Hawaianas","Tecnológico 4D","Tecnológico 5D","Tecnológico 6D","Russian Teach","Wispy","Volumen Ruso","FOXY","Mega Volumen"];

        function uid(prefix = "id") {
          return `${prefix}_${Date.now()}_${Math.random().toString(36).slice(2, 9)}`;
        }

        function emptyClient() {
          return {
            id: uid("cli"),
            nombre: "",
            telefono: "",
            fechaNacimiento: "",
            observaciones: "",
            alergias: "",
            creadoEn: new Date().toISOString(),
            historial: [],
            fotos: [],
          };
        }

        function emptyHistorialEntry() {
          return {
            id: uid("hist"),
            fecha: new Date().toISOString().slice(0, 10),
            categoria: "pestanas",
            servicio: "",
            tipoPestanas: "",
            curvatura: "",
            grosor: "",
            longitud: "",
            tecnica: "",
            mapping: "",
            productos: "",
            tiempoMinutos: "",
            precio: "",
            observaciones: "",
          };
        }

        function emptyAppointment() {
          return {
            id: uid("apt"),
            clienteId: "",
            clienteNombre: "",
            fecha: new Date().toISOString().slice(0, 10),
            hora: "10:00",
            categoria: "pestanas",
            servicio: "",
            estado: "pendiente",
            notas: "",
          };
        }

        /* ============================================================
           ICONOS
           ============================================================ */
        const Icon = ({ name, size = 18, className = "" }) => {
          const common = { width: size, height: size, viewBox: "0 0 24 24", fill: "none", stroke: "currentColor", strokeWidth: 1.6, strokeLinecap: "round", strokeLinejoin: "round", className };
          switch (name) {
            case "search": return <svg {...common}><circle cx="10.5" cy="10.5" r="6.5" /><line x1="20" y1="20" x2="15.3" y2="15.3" /></svg>;
            case "plus": return <svg {...common}><line x1="12" y1="5" x2="12" y2="19" /><line x1="5" y1="12" x2="19" y2="12" /></svg>;
            case "calendar": return <svg {...common}><rect x="3" y="5" width="18" height="16" rx="2" /><line x1="3" y1="10" x2="21" y2="10" /><line x1="8" y1="3" x2="8" y2="7" /><line x1="16" y1="3" x2="16" y2="7" /></svg>;
            case "book": return <svg {...common}><path d="M4 4.5C4 3.7 4.7 3 5.5 3H12v18H5.5c-.8 0-1.5-.7-1.5-1.5V4.5z" /><path d="M20 4.5c0-.8-.7-1.5-1.5-1.5H12v18h6.5c.8 0 1.5-.7 1.5-1.5V4.5z" /></svg>;
            case "phone": return <svg {...common}><path d="M5 4h3l2 5-2.5 1.5a11 11 0 0 0 5 5L14 13l5 2v3a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z" /></svg>;
            case "back": return <svg {...common}><line x1="19" y1="12" x2="5" y2="12" /><polyline points="11 6 5 12 11 18" /></svg>;
            case "check": return <svg {...common}><polyline points="20 6 9 17 4 12" /></svg>;
            case "x": return <svg {...common}><line x1="18" y1="6" x2="6" y2="18" /><line x1="6" y1="6" x2="18" y2="18" /></svg>;
            case "edit": return <svg {...common}><path d="M12 20h9" /><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z" /></svg>;
            case "trash": return <svg {...common}><polyline points="3 6 5 6 21 6" /><path d="M19 6l-1.5 14a2 2 0 0 1-2 1.8H8.5a2 2 0 0 1-2-1.8L5 6" /><path d="M10 11v5" /><path d="M14 11v5" /><path d="M9 6V4.5C9 3.7 9.7 3 10.5 3h3c.8 0 1.5.7 1.5 1.5V6" /></svg>;
            case "camera": return <svg {...common}><path d="M4 8h3l1.5-2.5h7L17 8h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z" /><circle cx="12" cy="13.5" r="3.5" /></svg>;
            case "lash": return <svg {...common}><path d="M3 15c2-5 6-8 9-8s7 3 9 8" /><line x1="6" y1="15" x2="5" y2="10.5" /><line x1="9.5" y1="13" x2="9" y2="8.5" /><line x1="13" y1="12" x2="13" y2="7.5" /><line x1="16.5" y1="13" x2="17" y2="8.5" /><line x1="20" y1="15" x2="21" y2="10.5" /></svg>;
            case "lift": return <svg {...common}><path d="M3 16c2.5-7 6.5-11 9-11s6.5 4 9 11" /></svg>;
            case "brow": return <svg {...common}><path d="M4 13c2-4 5-6 8-6s6 2 8 6" /></svg>;
            case "wax": return <svg {...common}><path d="M12 3c3 4 6 7 6 11a6 6 0 0 1-12 0c0-4 3-7 6-11z" /></svg>;
            case "nail": return <svg {...common}><path d="M9 21V11a3 3 0 0 1 6 0v10" /><path d="M9 21h6" /></svg>;
            case "star": return <svg {...common}><path d="M12 3l2.6 5.8 6.4.7-4.8 4.3 1.3 6.2L12 16.8 6.5 20l1.3-6.2-4.8-4.3 6.4-.7z" /></svg>;
            case "chevronLeft": return <svg {...common}><polyline points="15 18 9 12 15 6" /></svg>;
            case "chevronRight": return <svg {...common}><polyline points="9 18 15 12 9 6" /></svg>;
            case "alert": return <svg {...common}><path d="M12 3 2 20h20L12 3z" /><line x1="12" y1="10" x2="12" y2="14.5" /><circle cx="12" cy="17.2" r="0.4" fill="currentColor" /></svg>;
            case "image": return <svg {...common}><rect x="3" y="4" width="18" height="16" rx="2" /><circle cx="8.5" cy="9.5" r="1.5" /><path d="M21 16l-5-5-4 4-2-2-5 5" /></svg>;
            case "clock": return <svg {...common}><circle cx="12" cy="12" r="9" /><polyline points="12 7 12 12 16 14" /></svg>;
            case "list": return <svg {...common}><line x1="9" y1="6" x2="20" y2="6" /><line x1="9" y1="12" x2="20" y2="12" /><line x1="9" y1="18" x2="20" y2="18" /><circle cx="4.5" cy="6" r="0.8" fill="currentColor" /><circle cx="4.5" cy="12" r="0.8" fill="currentColor" /><circle cx="4.5" cy="18" r="0.8" fill="currentColor" /></svg>;
            default: return null;
          }
        };

        const categoryIcon = (catId) => SERVICE_CATEGORIES.find((c) => c.id === catId)?.icon || "star";
        const categoryLabel = (catId) => SERVICE_CATEGORIES.find((c) => c.id === catId)?.label || "Servicio";

        /* ============================================================
           COMPONENTE APP PRINCIPAL
           ============================================================ */
        function App() {
          const [view, setView] = useState("clientes");
          const [clients, setClients] = useState([]);
          const [appointments, setAppointments] = useState([]);
          const [loading, setLoading] = useState(true);
          const [selectedClientId, setSelectedClientId] = useState(null);
          const [toast, setToast] = useState(null);

          useEffect(() => {
            const c = storageGet(STORAGE_KEYS.CLIENTS, []);
            const a = storageGet(STORAGE_KEYS.APPOINTMENTS, []);
            setClients(c);
            setAppointments(a);
            setLoading(false);
          }, []);

          const showToast = useCallback((msg) => {
            setToast(msg);
            setTimeout(() => setToast(null), 2200);
          }, []);

          const persistClients = useCallback((next) => {
            setClients(next);
            const ok = storageSet(STORAGE_KEYS.CLIENTS, next);
            if (!ok) showToast("No se pudo guardar. Intenta de nuevo.");
          }, [showToast]);

          const persistAppointments = useCallback((next) => {
            setAppointments(next);
            const ok = storageSet(STORAGE_KEYS.APPOINTMENTS, next);
            if (!ok) showToast("No se pudo guardar. Intenta de nuevo.");
          }, [showToast]);

          const selectedClient = useMemo(
            () => clients.find((c) => c.id === selectedClientId) || null,
            [clients, selectedClientId]
          );

          const openClient = (id) => {
            setSelectedClientId(id);
            setView("ficha");
          };

          if (loading) {
            return (
              <div style={styles.loadingScreen}>
                <div style={styles.loadingMark}>✦</div>
                <p style={styles.loadingText}>Abriendo el estudio…</p>
              </div>
            );
          }

          return (
            <div style={styles.app}>
              <Sidebar view={view} setView={setView} clearSelection={() => setSelectedClientId(null)} />
              <main style={styles.main} className="studio-main">
                {view === "clientes" && (
                  <ClientList
                    clients={clients}
                    onOpen={openClient}
                    onCreate={(newClient) => {
                      const next = [newClient, ...clients];
                      persistClients(next);
                      showToast("Ficha creada");
                      openClient(newClient.id);
                    }}
                  />
                )}
                {view === "ficha" && selectedClient && (
                  <ClientFile
                    client={selectedClient}
                    onBack={() => setView("clientes")}
                    onUpdate={(updated) => {
                      const next = clients.map((c) => (c.id === updated.id ? updated : c));
                      persistClients(next);
                    }}
                    onDelete={(id) => {
                      const next = clients.filter((c) => c.id !== id);
                      persistClients(next);
                      setView("clientes");
                      showToast("Ficha eliminada");
                    }}
                    showToast={showToast}
                  />
                )}
                {view === "agenda" && (
                  <Agenda
                    appointments={appointments}
                    clients={clients}
                    onUpdate={persistAppointments}
                    onOpenClient={openClient}
                    showToast={showToast}
                  />
                )}
              </main>
              {/* Bottom nav para móvil */}
              <nav className="bottom-nav">
                <div className="bottom-nav-inner">
                  <button className={`bottom-nav-btn ${view === "clientes" || view === "ficha" ? "active" : ""}`} onClick={() => { setSelectedClientId(null); setView("clientes"); }}>
                    <Icon name="book" size={22} />
                    Clientas
                  </button>
                  <button className={`bottom-nav-btn ${view === "agenda" ? "active" : ""}`} onClick={() => { setSelectedClientId(null); setView("agenda"); }}>
                    <Icon name="calendar" size={22} />
                    Agenda
                  </button>
                </div>
              </nav>
              {toast && <div style={styles.toast}>{toast}</div>}
            </div>
          );
        }

        /* ============================================================
           COMPONENTES COMPLEMENTARIOS (SIDEBAR, LISTAS, ETC.)
           ============================================================ */
        function Sidebar({ view, setView, clearSelection }) {
          const items = [
            { id: "clientes", label: "Clientas", icon: "book" },
            { id: "agenda", label: "Agenda", icon: "calendar" },
          ];
          return (
            <aside style={styles.sidebar} className="studio-sidebar">
              <div style={styles.brand}>
                <div style={styles.brandMark}>✦</div>
                <div>
                  <div style={styles.brandTitle}>Estudio</div>
                  <div style={styles.brandSub}>Fichas &amp; agenda</div>
                </div>
              </div>
              <nav style={styles.nav}>
                {items.map((it) => (
                  <button
                    key={it.id}
                    onClick={() => {
                      clearSelection();
                      setView(it.id);
                    }}
                    style={{
                      ...styles.navBtn,
                      ...(view === it.id || (view === "ficha" && it.id === "clientes") ? styles.navBtnActive : {}),
                    }}
                  >
                    <Icon name={it.icon} size={17} />
                    <span>{it.label}</span>
                  </button>
                ))}
              </nav>
              <div style={styles.sidebarFoot}>
                <div style={styles.foldTabs}>
                  {SERVICE_CATEGORIES.slice(0, 5).map((c) => (
                    <div key={c.id} style={styles.foldTab} title={c.label}>
                      <Icon name={c.icon} size={13} />
                    </div>
                  ))}
                </div>
                <p style={styles.foldNote}>Preparado para más servicios</p>
              </div>
            </aside>
          );
        }

        function ClientList({ clients, onOpen, onCreate }) {
          const [query, setQuery] = useState("");
          const [showNew, setShowNew] = useState(false);

          const filtered = useMemo(() => {
            const q = query.trim().toLowerCase();
            if (!q) return clients;
            return clients.filter(
              (c) =>
                c.nombre.toLowerCase().includes(q) ||
                (c.telefono || "").toLowerCase().includes(q)
            );
          }, [clients, query]);

          return (
            <div style={styles.page}>
              <header style={styles.pageHeader} className="page-header-responsive">
                <div>
                  <p style={styles.eyebrow}>Tu cartera de clientas</p>
                  <h1 style={styles.h1}>Fichas</h1>
                </div>
                <button style={styles.primaryBtn} onClick={() => setShowNew(true)}>
                  <Icon name="plus" size={16} />
                  Nueva ficha
                </button>
              </header>

              <div style={styles.searchBar}>
                <Icon name="search" size={16} className="search-icon" />
                <input
                  style={styles.searchInput}
                  placeholder="Buscar por nombre o teléfono…"
                  value={query}
                  onChange={(e) => setQuery(e.target.value)}
                  autoFocus
                />
              </div>

              {filtered.length === 0 && (
                <div style={styles.emptyState}>
                  <Icon name="book" size={28} className="empty-icon" />
                  <p style={styles.emptyTitle}>
                    {clients.length === 0 ? "Aún no hay fichas creadas" : "No encontramos coincidencias"}
                  </p>
                  <p style={styles.emptyText}>
                    {clients.length === 0 ? "Crea la primera ficha para empezar." : "Intenta con otro nombre."}
                  </p>
                </div>
              )}

              <div style={styles.clientGrid} className="client-grid-responsive">
                {filtered.map((c) => (
                  <ClientCard key={c.id} client={c} onOpen={() => onOpen(c.id)} />
                ))}
              </div>

              {showNew && (
                <NewClientModal
                  onClose={() => setShowNew(false)}
                  onSave={(client) => {
                    setShowNew(false);
                    onCreate(client);
                  }}
                />
              )}
            </div>
          );
        }

        function ClientCard({ client, onOpen }) {
          const lastVisit = client.historial[0];
          const initials = client.nombre.split(" ").filter(Boolean).slice(0, 2).map((w) => w[0]?.toUpperCase()).join("");

          return (
            <button style={styles.clientCard} onClick={onOpen}>
              <div style={styles.clientAvatar}>{initials || "?"}</div>
              <div style={styles.clientCardBody}>
                <div style={styles.clientCardName}>{client.nombre || "Sin nombre"}</div>
                <div style={styles.clientCardMeta}>
                  <Icon name="phone" size={12} />
                  <span>{client.telefono || "Sin teléfono"}</span>
                </div>
                {lastVisit ? (
                  <div style={styles.clientCardLast}>
                    Última visita · {formatDate(lastVisit.fecha)} · {categoryLabel(lastVisit.categoria)}
                  </div>
                ) : (
                  <div style={styles.clientCardLastEmpty}>Sin visitas registradas</div>
                )}
                {client.alergias && (
                  <div style={styles.allergyPill}>
                    <Icon name="alert" size={11} />
                    Alergias
                  </div>
                )}
              </div>
            </button>
          );
        }

        function NewClientModal({ onClose, onSave }) {
          const [form, setForm] = useState(emptyClient());
          const set = (key) => (e) => setForm({ ...form, [key]: e.target.value });
          const canSave = form.nombre.trim().length > 0;

          return (
            <Modal onClose={onClose} title="Nueva ficha de clienta">
              <div style={styles.formGrid} className="form-grid-responsive">
                <Field label="Nombre completo *">
                  <input style={styles.input} value={form.nombre} onChange={set("nombre")} autoFocus placeholder="Ej. María Fernanda Ruiz" />
                </Field>
                <Field label="Teléfono">
                  <input style={styles.input} value={form.telefono} onChange={set("telefono")} placeholder="Ej. 04XX-XXXXXXX" />
                </Field>
                <Field label="Fecha de nacimiento (opcional)">
                  <input type="date" style={styles.input} value={form.fechaNacimiento} onChange={set("fechaNacimiento")} />
                </Field>
                <Field label="Alergias o contraindicaciones">
                  <input style={styles.input} value={form.alergias} onChange={set("alergias")} placeholder="Ej. Alergia al pegamento" />
                </Field>
                <Field label="Observaciones" full>
                  <textarea style={styles.textarea} value={form.observaciones} onChange={set("observaciones")} placeholder="Detalles importantes..." />
                </Field>
              </div>
              <div style={styles.modalActions}>
                <button style={styles.secondaryBtn} onClick={onClose}>Cancelar</button>
                <button style={{ ...styles.primaryBtn, opacity: canSave ? 1 : 0.5 }} disabled={!canSave} onClick={() => onSave(form)}>
                  <Icon name="check" size={16} />
                  Crear ficha
                </button>
              </div>
            </Modal>
          );
        }

        function ClientFile({ client, onBack, onUpdate, onDelete, showToast }) {
          const [tab, setTab] = useState("info");
          const [editingInfo, setEditingInfo] = useState(false);
          const [showNewEntry, setShowNewEntry] = useState(false);
          const [confirmDelete, setConfirmDelete] = useState(false);

          const sortedHistorial = useMemo(
            () => [...client.historial].sort((a, b) => (a.fecha < b.fecha ? 1 : -1)),
            [client.historial]
          );

          return (
            <div style={styles.page}>
              <button style={styles.backLink} onClick={onBack}>
                <Icon name="back" size={16} />
                Todas las clientas
              </button>

              <header style={styles.fileHeader} className="file-header-responsive">
                <div style={styles.fileHeaderLeft}>
                  <div style={styles.fileAvatar}>
                    {client.nombre.split(" ").filter(Boolean).slice(0, 2).map((w) => w[0]?.toUpperCase()).join("") || "?"}
                  </div>
                  <div>
                    <h1 style={styles.h1}>{client.nombre}</h1>
                    <div style={styles.fileMetaRow}>
                      <Icon name="phone" size={13} />
                      <span>{client.telefono || "Sin teléfono"}</span>
                    </div>
                  </div>
                </div>
                <div style={styles.fileHeaderActions} className="file-header-actions">
                  <button style={styles.iconBtn} onClick={() => setEditingInfo(true)}><Icon name="edit" size={15} /></button>
                  <button style={styles.iconBtnDanger} onClick={() => setConfirmDelete(true)}><Icon name="trash" size={15} /></button>
                </div>
              </header>

              {client.alergias && (
                <div style={styles.allergyBanner}>
                  <Icon name="alert" size={15} />
                  <span><strong>Alergias / contraindicaciones:</strong> {client.alergias}</span>
                </div>
              )}

              <div className="tabs-scroll"><div style={styles.tabs}>
                <TabBtn active={tab === "info"} onClick={() => setTab("info")} icon="book" label="Observaciones" />
                <TabBtn active={tab === "historial"} onClick={() => setTab("historial")} icon="list" label={`Historial (${client.historial.length})`} />
                <TabBtn active={tab === "otros"} onClick={() => setTab("otros")} icon="star" label="Otros servicios" />
                <TabBtn active={tab === "fotos"} onClick={() => setTab("fotos")} icon="camera" label="Fotografías" />
                <TabBtn active={tab === "consentimiento"} onClick={() => setTab("consentimiento")} icon="check" label="Consentimiento" />
              </div></div>

              {tab === "info" && (
                <div style={styles.infoPanel}>
                  <p style={styles.infoLabel}>Observaciones generales</p>
                  <p style={styles.infoText}>{client.observaciones || "Sin observaciones registradas."}</p>
                </div>
              )}

              {tab === "historial" && (
                <div>
                  <div style={styles.sectionHeaderRow}>
                    <p style={styles.sectionHint}>Servicios realizados de más reciente a más antiguo.</p>
                    <button style={styles.primaryBtnSm} onClick={() => setShowNewEntry(true)}>
                      <Icon name="plus" size={14} />
                      Registrar servicio
                    </button>
                  </div>

                  {sortedHistorial.length === 0 ? (
                    <div style={styles.emptyState}>
                      <Icon name="list" size={26} className="empty-icon" />
                      <p style={styles.emptyTitle}>Sin servicios registrados</p>
                    </div>
                  ) : (
                    <div style={styles.timeline}>
                      {sortedHistorial.map((h) => (
                        <HistorialCard
                          key={h.id}
                          entry={h}
                          onDelete={() => {
                            const next = { ...client, historial: client.historial.filter((x) => x.id !== h.id) };
                            onUpdate(next);
                            showToast("Servicio eliminado");
                          }}
                        />
                      ))}
                    </div>
                  )}
                </div>
              )}

              {tab === "fotos" && <PhotosPanel client={client} onUpdate={onUpdate} />}

              {tab === "otros" && <OtrosServiciosPanel client={client} onUpdate={onUpdate} showToast={showToast} />}

              {tab === "consentimiento" && <ConsentimientoPanel client={client} onUpdate={onUpdate} showToast={showToast} />}

              {editingInfo && (
                <EditClientModal
                  client={client}
                  onClose={() => setEditingInfo(false)}
                  onSave={(updated) => {
                    onUpdate(updated);
                    setEditingInfo(false);
                    showToast("Datos actualizados");
                  }}
                />
              )}

              {showNewEntry && (
                <HistorialModal
                  onClose={() => setShowNewEntry(false)}
                  onSave={(entry) => {
                    const next = { ...client, historial: [entry, ...client.historial] };
                    onUpdate(next);

        function ConsentimientoPanel({ client, onUpdate, showToast }) {
          const consent = client.consentimiento || {};
          const [form, setForm] = React.useState({
            antecedentes: consent.antecedentes || "",
            alergias: consent.alergias || "",
            lentesContacto: consent.lentesContacto || false,
            claustrofobia: consent.claustrofobia || false,
            excesoPestanas: consent.excesoPestanas || false,
            lagrimalSeco: consent.lagrimalSeco || false,
            cataratas: consent.cataratas || false,
            vertigo: consent.vertigo || false,
            otros: consent.otros || "",
            firmadoEn: consent.firmadoEn || null,
            firmaDataUrl: consent.firmaDataUrl || null,
          });
          const [signed, setSigned] = React.useState(!!consent.firmaDataUrl);
          const [drawing, setDrawing] = React.useState(false);
          const canvasRef = React.useRef(null);
          const lastPos = React.useRef(null);

          const setField = (key) => (e) => setForm({ ...form, [key]: e.target.type === "checkbox" ? e.target.checked : e.target.value });

          // Canvas helpers
          const getPos = (e, canvas) => {
            const rect = canvas.getBoundingClientRect();
            const src = e.touches ? e.touches[0] : e;
            // coordinates in CSS pixels (canvas is already scaled via ctx.scale)
            return {
              x: src.clientX - rect.left,
              y: src.clientY - rect.top,
            };
          };

          const points = React.useRef([]);

          const startDraw = (e) => {
            e.preventDefault();
            setDrawing(true);
            const canvas = canvasRef.current;
            const pos = getPos(e, canvas);
            lastPos.current = pos;
            points.current = [pos];
            // Punto inicial
            const ctx = canvas.getContext("2d");
            ctx.beginPath();
            ctx.arc(pos.x, pos.y, 1.2, 0, Math.PI * 2);
            ctx.fillStyle = COLORS.ink;
            ctx.fill();
          };

          const draw = (e) => {
            e.preventDefault();
            if (!drawing) return;
            const canvas = canvasRef.current;
            const ctx = canvas.getContext("2d");
            const pos = getPos(e, canvas);
            points.current.push(pos);

            const pts = points.current;
            if (pts.length < 3) {
              ctx.beginPath();
              ctx.moveTo(lastPos.current.x, lastPos.current.y);
              ctx.lineTo(pos.x, pos.y);
              ctx.strokeStyle = COLORS.ink;
              ctx.lineWidth = 2.2;
              ctx.lineCap = "round";
              ctx.lineJoin = "round";
              ctx.stroke();
            } else {
              // Curva Bezier cuadrática suave entre puntos
              const i = pts.length - 1;
              const midX = (pts[i - 1].x + pts[i].x) / 2;
              const midY = (pts[i - 1].y + pts[i].y) / 2;
              ctx.beginPath();
              ctx.moveTo((pts[i - 2].x + pts[i - 1].x) / 2, (pts[i - 2].y + pts[i - 1].y) / 2);
              ctx.quadraticCurveTo(pts[i - 1].x, pts[i - 1].y, midX, midY);
              ctx.strokeStyle = COLORS.ink;
              ctx.lineWidth = 2.2;
              ctx.lineCap = "round";
              ctx.lineJoin = "round";
              ctx.stroke();
            }
            lastPos.current = pos;
          };

          const endDraw = (e) => {
            e.preventDefault();
            setDrawing(false);
            lastPos.current = null;
            points.current = [];
          };

          const clearCanvas = () => {
            const canvas = canvasRef.current;
            const ctx = canvas.getContext("2d");
            const dpr = window.devicePixelRatio || 1;
            ctx.setTransform(1,0,0,1,0,0);
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.scale(dpr, dpr);
            const w = canvas.width / dpr;
            ctx.beginPath();
            ctx.moveTo(30, 165);
            ctx.lineTo(w - 30, 165);
            ctx.strokeStyle = "#E7DDD2";
            ctx.lineWidth = 1.5;
            ctx.stroke();
            setSigned(false);
          };

          // Inicializar canvas con línea base y escala DPR
          React.useEffect(() => {
            const init = () => {
              const canvas = canvasRef.current;
              if (!canvas) return;
              const dpr = window.devicePixelRatio || 1;
              const rect = canvas.getBoundingClientRect();
              if (rect.width === 0) { setTimeout(init, 50); return; }
              canvas.width = Math.round(rect.width * dpr);
              canvas.height = Math.round(200 * dpr);
              const ctx = canvas.getContext("2d");
              ctx.setTransform(1,0,0,1,0,0);
              ctx.scale(dpr, dpr);
              // Línea base guía
              ctx.beginPath();
              ctx.moveTo(30, 165);
              ctx.lineTo(rect.width - 30, 165);
              ctx.strokeStyle = "#E7DDD2";
              ctx.lineWidth = 1.5;
              ctx.stroke();
              // Cargar firma guardada
              if (form.firmaDataUrl) {
                const img = new Image();
                img.onload = () => ctx.drawImage(img, 0, 0, rect.width, 200);
                img.src = form.firmaDataUrl;
              }
            };
            setTimeout(init, 30);
          }, []);

          const saveConsent = () => {
            const canvas = canvasRef.current;
            const dataUrl = canvas.toDataURL("image/png");
            // check if canvas has any drawing
            const blank = document.createElement("canvas");
            blank.width = canvas.width; blank.height = canvas.height;
            const isEmpty = dataUrl === blank.toDataURL("image/png");
            const updatedForm = {
              ...form,
              firmaDataUrl: isEmpty ? null : dataUrl,
              firmadoEn: isEmpty ? null : new Date().toISOString(),
            };
            setSigned(!isEmpty);
            onUpdate({ ...client, consentimiento: updatedForm });
            showToast("Consentimiento guardado");
          };



          const checkboxStyle = { display: "flex", alignItems: "center", gap: 8, fontSize: 13.5, color: COLORS.ink, cursor: "pointer" };
          const checkboxGrid = { display: "grid", gridTemplateColumns: "1fr 1fr", gap: 10, marginTop: 4 };

          return (
            <div style={{ display: "flex", flexDirection: "column", gap: 18 }}>
              {/* Antecedentes */}
              <div style={styles.infoPanel}>
                <p style={styles.infoLabel}>Antecedentes médicos u otros</p>
                <textarea
                  style={{ ...styles.textarea, marginTop: 4 }}
                  value={form.antecedentes}
                  onChange={setField("antecedentes")}
                  placeholder="Ej. Usa lentes de contacto..."
                />
              </div>

              {/* Alergias */}
              <div style={styles.infoPanel}>
                <p style={styles.infoLabel}>Alergias</p>
                <textarea
                  style={{ ...styles.textarea, marginTop: 4 }}
                  value={form.alergias}
                  onChange={setField("alergias")}
                  placeholder="Ej. Ninguna / alergia al pegamento..."
                />
              </div>

              {/* Checkboxes */}
              <div style={styles.infoPanel}>
                <p style={styles.infoLabel}>Condiciones</p>
                <div style={checkboxGrid}>
                  {[
                    ["lentesContacto", "Uso lentes de contacto"],
                    ["claustrofobia", "Claustrofobia"],
                    ["excesoPestanas", "Exceso de lágrimas"],
                    ["lagrimalSeco", "Lagrimal seco"],
                    ["cataratas", "Cataratas"],
                    ["vertigo", "Vértigo"],
                  ].map(([key, label]) => (
                    <label key={key} style={checkboxStyle}>
                      <input
                        type="checkbox"
                        checked={form[key]}
                        onChange={setField(key)}
                        style={{ width: 16, height: 16, accentColor: COLORS.terracotta }}
                      />
                      {label}
                    </label>
                  ))}
                </div>
                <div style={{ marginTop: 12 }}>
                  <label style={styles.fieldLabel}>Otros</label>
                  <input style={{ ...styles.input, marginTop: 4 }} value={form.otros} onChange={setField("otros")} placeholder="Otros antecedentes..." />
                </div>
              </div>

              {/* Texto de consentimiento */}
              <div style={{ ...styles.infoPanel, background: COLORS.bgAlt }}>
                <p style={{ ...styles.infoLabel, marginBottom: 10 }}>Consentimiento</p>
                <p style={{ fontSize: 12.5, color: COLORS.inkSoft, lineHeight: 1.7, margin: 0 }}>
                  He leído y entiendo los puntos anteriores.<br />
                  He sido informada del procedimiento y cuidado de las extensiones de pestañas.<br />
                  He entendido y me hago cargo de los cuidados posteriores de las extensiones de pestañas.<br />
                  En caso de presentar alguna reacción alérgica, debo dar aviso de forma inmediata, luego según indicaciones hacemos el retiro de las extensiones.
                </p>
              </div>

              {/* Firma */}
              <div style={{ ...styles.infoPanel, padding: 0, overflow: "hidden" }}>
                <div style={{ display: "flex", justifyContent: "space-between", alignItems: "center", padding: "14px 18px", borderBottom: `1px solid ${COLORS.border}`, background: COLORS.bgAlt }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 8 }}>
                    <span style={{ fontSize: 16 }}>✍️</span>
                    <p style={{ ...styles.infoLabel, margin: 0 }}>Firma de la clienta</p>
                  </div>
                  <button style={{ padding: "5px 14px", borderRadius: 8, border: `1px solid ${COLORS.border}`, background: "#fff", color: COLORS.inkSoft, fontSize: 12, fontWeight: 600, cursor: "pointer" }} onClick={clearCanvas}>
                    Limpiar
                  </button>
                </div>
                <div style={{ padding: 16 }}>
                <div style={{ position: "relative", borderRadius: 12, overflow: "hidden", border: `1.5px solid ${COLORS.border}`, background: "#FDFCFB" }}>
                  <canvas
                    ref={canvasRef}
                    style={{ width: "100%", height: 200, display: "block", touchAction: "none", cursor: "crosshair" }}
                    onMouseDown={startDraw}
                    onMouseMove={draw}
                    onMouseUp={endDraw}
                    onMouseLeave={endDraw}

                  {!signed && (

                    </div>

                </p>
                </div>
              </div>

              <div style={{ display: "flex", justifyContent: "flex-end" }}>

          );

        function OtrosServiciosPanel({ client, onUpdate, showToast }) {

          const otrosServicios = client.otrosServicios || [];
          const [showForm, setShowForm] = React.useState(false);
          const [editingId, setEditingId] = React.useState(null);
          const [form, setForm] = React.useState({ categoria: "manos", nombre: "", preferencias: "", ultimaVez: "" });
          const [confirmDel, setConfirmDel] = React.useState(null);

          const setField = (key) => (e) => setForm({ ...form, [key]: e.target.value });

            showToast(editingId ? "Servicio actualizado" : "Servicio agregado");

          const deleteServicio = (id) => {

        }

        function Agenda({ appointments, clients, onUpdate, onOpenClient, showToast }) {
          const [mode, setMode] = useState("semana");
          const [cursor, setCursor] = useState(new Date());
          const [showNew, setShowNew] = useState(false);
          const [editing, setEditing] = useState(null);

          const days = useMemo(() => {
            if (mode === "dia") return [new Date(cursor)];
            const start = startOfWeek(cursor);
            return Array.from({ length: 7 }, (_, i) => addDays(start, i));
          }, [mode, cursor]);

          const appsByDay = useMemo(() => {
            const map = {};
            for (const d of days) map[dateKey(d)] = [];
            for (const a of appointments) {
              if (map[a.fecha]) map[a.fecha].push(a);
            }
            return map;
          }, [appointments, days]);

          return (
            <div style={styles.page}>
              <header style={styles.pageHeader} className="page-header-responsive">
                <div><p style={styles.eyebrow}>Tu semana de trabajo</p><h1 style={styles.h1}>Agenda</h1></div>
                <button style={styles.primaryBtn} onClick={() => setShowNew(true)}><Icon name="plus" size={16} />Nueva cita</button>
              </header>
              <div style={styles.agendaToolbar}>
                <span style={styles.agendaRangeLabel}>{rangeLabel(days, mode)}</span>
                <div style={styles.modeToggle}>
                  <button style={{ ...styles.modeBtn, ...(mode === "dia" ? styles.modeBtnActive : {}) }} onClick={() => setMode("dia")}>Día</button>
                  <button style={{ ...styles.modeBtn, ...(mode === "semana" ? styles.modeBtnActive : {}) }} onClick={() => setMode("semana")}>Semana</button>
                </div>
              </div>
              <div className="agenda-scroll"><div style={{ ...styles.agendaGrid, gridTemplateColumns: `repeat(${days.length}, 1fr)` }} className="agenda-week-min">
                {days.map((d) => {
                  const key = dateKey(d);
                  const dayApts = appsByDay[key] || [];
                  return (
                    <div key={key} style={styles.agendaCol}>
                      <div style={styles.agendaColHeader}><span>{weekdayLabel(d)}</span><strong>{d.getDate()}</strong></div>
                      <div style={styles.agendaColBody}>
                        {dayApts.length === 0 && <p style={styles.agendaEmptyDay}>Sin citas</p>}
                        {dayApts.map((a) => (
                          <AppointmentCard key={a.id} apt={a} onEdit={() => setEditing(a)} onOpenClient={() => a.clienteId && onOpenClient(a.clienteId)} />
                        ))}
                      </div>
                    </div>
                  );
                })}
              </div></div>
              {showNew && (
                <AppointmentModal
                  clients={clients}
                  initial={{ ...emptyAppointment(), fecha: dateKey(cursor) }}
                  onClose={() => setShowNew(false)}
                  onSave={(apt) => { onUpdate([...appointments, apt]); setShowNew(false); showToast("Cita agendada"); }}
                />
              )}
              {editing && (
                <AppointmentModal
                  clients={clients}
                  initial={editing}
                  editing
                  onClose={() => setEditing(null)}
                  onSave={(apt) => { onUpdate(appointments.map((a) => a.id === apt.id ? apt : a)); setEditing(null); showToast("Actualizada"); }}
                />
              )}
            </div>
          );
        }

        function AppointmentCard({ apt, onEdit, onOpenClient }) {
          return (
            <div style={{ ...styles.aptCard, background: "#FFF6ED", borderColor: "#E8C9A0" }}>
              <span style={styles.aptTime}>{apt.hora}</span>
              <button style={styles.aptClientName} onClick={onOpenClient}>{apt.clienteNombre || "Sin clienta"}</button>
              <div style={styles.aptService}>{apt.servicio || categoryLabel(apt.categoria)}</div>
              <button style={{...styles.primaryBtnSm, marginTop: 5, padding: "4px 8px", fontSize: 11}} onClick={onEdit}>Editar</button>
            </div>
          );
        }

        function AppointmentModal({ clients, initial, editing, onClose, onSave }) {
          const [form, setForm] = useState(initial);
          const set = (key) => (e) => setForm({ ...form, [key]: e.target.value });

          return (
            <Modal onClose={onClose} title={editing ? "Editar cita" : "Nueva cita"}>
              <div style={styles.formGrid} className="form-grid-responsive">
                <Field label="Clienta" full>
                  <select style={styles.input} value={form.clienteId} onChange={(e) => {
                    const c = clients.find((cl) => cl.id === e.target.value);
                    setForm({ ...form, clienteId: e.target.value, clienteNombre: c ? c.nombre : form.clienteNombre });
                  }}>
                    <option value="">Seleccionar clienta…</option>
                    {clients.map((c) => <option key={c.id} value={c.id}>{c.nombre}</option>)}
                  </select>
                </Field>
                <Field label="Fecha"><input type="date" style={styles.input} value={form.fecha} onChange={set("fecha")} /></Field>
                <Field label="Hora"><input type="time" style={styles.input} value={form.hora} onChange={set("hora")} /></Field>
                <Field label="Servicio" full><input style={styles.input} value={form.servicio} onChange={set("servicio")} /></Field>
              </div>
              <div style={styles.modalActions}>
                <button style={styles.secondaryBtn} onClick={onClose}>Cancelar</button>
                <button style={styles.primaryBtn} onClick={() => onSave(form)}>Confirmar</button>
              </div>
            </Modal>
          );
        }

        /* ============================================================

           ============================================================ */
        function Modal({ children, onClose, title, wide, narrow }) {
          return (
            <div style={styles.modalOverlay} className="modal-overlay-responsive" onClick={onClose}>
              <div style={{ ...styles.modalCard, ...(wide ? { maxWidth: 640 } : {}), ...(narrow ? { maxWidth: 380 } : {}) }} onClick={(e) => e.stopPropagation()}>
                <div style={styles.modalHeader}><h2 style={styles.modalTitle}>{title}</h2><button style={styles.modalClose} onClick={onClose}><Icon name="x" size={16} /></button></div>
                <div style={styles.modalBody}>{children}</div>
              </div>
            </div>

        }

        function Field({ label, children, full }) {
          return <div style={{ ...styles.field, ...(full ? { gridColumn: "1 / -1" } : {}) }}><label style={styles.fieldLabel}>{label}</label>{children}</div>;
        }

        /* ============================================================
           HELPERS METRICOS Y DE TIEMPO
           ============================================================ */
        function dateKey(d) { return d.toISOString().slice(0, 10); }
        function startOfWeek(d) { const date = new Date(d); const day = date.getDay(); date.setDate(date.getDate() - day); return date; }
        function addDays(d, n) { const date = new Date(d); date.setDate(date.getDate() + n); return date; }
        function weekdayLabel(d) { return d.toLocaleDateString("es-ES", { weekday: "short" }).replace(".", ""); }
        function rangeLabel(days, mode) { return mode === "dia" ? days[0].toLocaleDateString("es-ES", { day: "numeric", month: "long" }) : `${days[0].getDate()} - ${days[6].getDate()} de ${days[6].toLocaleDateString("es-ES", { month: "short" })}`; }
        function formatDate(iso) { if (!iso) return ""; const d = new Date(iso + (iso.length === 10 ? "T00:00:00" : "")); return d.toLocaleDateString("es-ES", { day: "numeric", month: "short" }); }
