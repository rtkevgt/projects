<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Ángela López · Estudio Lash Designer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,600;0,700;1,400&family=Dancing+Script:wght@700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
<div id="root"></div>

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --rose:       #F0AABF;
    --rose-deep:  #D4789A;
    --rose-light: #F8C8D8;
    --gold:       #D4AF7A;
    --gold-light: #EDD9A3;
    --gold-deep:  #B8923A;
    --pearl:      #FDF8F0;
    --blush:      #FDF4F7;
    --blush-mid:  #FAE8EF;
    --charcoal:   #2A1F1A;
    --ink:        #3D2B22;
    --ink-soft:   #7A5C46;
    --ink-muted:  #A88B6E;
    --white:      #FFFFFF;
    --border:     #FAE8EF;
    --danger:     #C47090;
    --shadow-sm:  0 2px 12px rgba(212,120,154,.08);
    --shadow-md:  0 8px 32px rgba(212,120,154,.12);
    --shadow-lg:  0 20px 60px rgba(212,120,154,.15);
    --radius-sm:  8px;
    --radius-md:  14px;
    --radius-lg:  20px;
    --radius-xl:  28px;
  }

  html { font-size: 15px; }
  body {
    font-family: 'Inter', -apple-system, sans-serif;
    background: var(--pearl);
    color: var(--ink);
    -webkit-font-smoothing: antialiased;
  }

  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--blush-mid); border-radius: 99px; }

  #root { display: flex; min-height: 100vh; }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    background: linear-gradient(180deg, #F2B8C8 0%, #ECAABF 60%, #E59AB4 100%);
    display: flex;
    flex-direction: column;
    position: sticky;
    top: 0;
    height: 100vh;
    overflow: hidden;
  }

  .sidebar::before {
    content: '';
    position: absolute;
    inset: 0;
    background:
      radial-gradient(ellipse at 20% 8%, rgba(212,175,122,.28) 0%, transparent 55%),
      radial-gradient(ellipse at 80% 92%, rgba(212,120,154,.12) 0%, transparent 55%);
    pointer-events: none;
  }

  /* warm golden glow decoration */
  .sidebar::after {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 90px;
    background:
      radial-gradient(ellipse at 15% 0%, rgba(212,175,122,.22) 0%, transparent 50%),
      radial-gradient(ellipse at 50% 0%, rgba(212,175,122,.18) 0%, transparent 55%),
      radial-gradient(ellipse at 85% 0%, rgba(212,175,122,.20) 0%, transparent 50%);
    pointer-events: none;
  }

  .sidebar-inner {
    position: relative;
    z-index: 1;
    display: flex;
    flex-direction: column;
    height: 100%;
    padding: 28px 20px 28px;
  }

  /* ── BRAND LOGO ── */
  .brand {
    display: flex;
    flex-direction: column;
    align-items: center;
    margin-bottom: 36px;
    text-align: center;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(212,175,122,.25);
  }

  /* SVG logo container */
  .brand-logo-wrap {
    width: 180px;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 0;
  }

  /* butterflies row */
  .butterflies {
    display: flex;
    justify-content: flex-end;
    width: 100%;
    gap: 6px;
    margin-bottom: -4px;
    padding-right: 8px;
  }

  .butterfly {
    opacity: .75;
    animation: flutter 3s ease-in-out infinite;
    font-size: 14px;
    filter: drop-shadow(0 1px 3px rgba(212,175,122,.5));
  }
  .butterfly:nth-child(1) { animation-delay: 0s; font-size: 10px; }
  .butterfly:nth-child(2) { animation-delay: .6s; font-size: 14px; }

  @keyframes flutter {
    0%, 100% { transform: translateY(0) rotate(-5deg); opacity: .6; }
    50% { transform: translateY(-4px) rotate(5deg); opacity: .9; }
  }

  /* AL monogram */
  .brand-monogram-text {
    font-family: 'Dancing Script', cursive;
    font-size: 56px;
    font-weight: 700;
    color: var(--white);
    line-height: 1;
    text-shadow: 0 2px 14px rgba(212,120,154,.22), 0 0 24px rgba(255,255,255,.25);
    letter-spacing: -2px;
    filter: drop-shadow(0 1px 2px rgba(212,120,154,.16));
  }

  /* underline swash */
  .brand-swash {
    width: 80px;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--gold), var(--gold-light), transparent);
    margin: 2px auto 10px;
    border-radius: 99px;
    opacity: .8;
  }

  .brand-name {
    font-family: 'Playfair Display', serif;
    font-size: 15px;
    font-weight: 700;
    color: var(--white);
    letter-spacing: 3px;
    text-transform: uppercase;
    line-height: 1.2;
    text-shadow: 0 1px 8px rgba(0,0,0,.3);
  }

  .brand-subtitle-wrap {
    margin-top: 7px;
    border: 1px solid rgba(212,175,122,.45);
    padding: 4px 12px;
    border-radius: 3px;
    background: rgba(212,175,122,.08);
  }

  .brand-subtitle {
    font-size: 8.5px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    color: var(--gold-light);
    opacity: .9;
  }

  /* ── NAV ── */
  .sidebar-nav { display: flex; flex-direction: column; gap: 6px; }

  .nav-btn {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 12px 16px;
    border-radius: var(--radius-md);
    border: none;
    background: transparent;
    color: rgba(255,255,255,.6);
    font-family: 'Inter', sans-serif;
    font-size: 13.5px;
    font-weight: 500;
    cursor: pointer;
    transition: all .2s ease;
    text-align: left;
  }

  .nav-btn:hover { background: rgba(255,255,255,.08); color: rgba(255,255,255,.9); }

  .nav-btn.active {
    background: rgba(255,255,255,.14);
    color: var(--white);
    font-weight: 600;
  }

  .nav-btn.active .nav-icon-wrap {
    background: linear-gradient(135deg, var(--gold), var(--gold-light));
    color: var(--rose-deep);
  }

  .nav-icon-wrap {
    width: 34px;
    height: 34px;
    border-radius: 10px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,.08);
    flex-shrink: 0;
    transition: all .2s ease;
  }

  .sidebar-footer {
    margin-top: auto;
    padding-top: 16px;
    border-top: 1px solid rgba(255,255,255,.08);
    text-align: center;
  }

  .sidebar-footer-text { font-size: 10px; color: rgba(255,255,255,.25); letter-spacing: 1px; text-transform: uppercase; }

  /* ── MAIN ── */
  .main-content {
    flex: 1;
    min-width: 0;
    padding: 40px 44px 80px;
    max-width: 1120px;
    margin: 0 auto;
    width: 100%;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(18px); }
    to   { opacity: 1; transform: translateY(0); }
  }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  .animate-in { animation: fadeUp .4s cubic-bezier(.22,.68,0,1.2) forwards; }
  .stagger-1 { animation-delay: .05s; opacity: 0; }
  .stagger-2 { animation-delay: .12s; opacity: 0; }
  .stagger-3 { animation-delay: .19s; opacity: 0; }

  /* ── PAGE HEADER ── */
  .page-header {
    display: flex;
    justify-content: space-between;
    align-items: flex-end;
    margin-bottom: 30px;
    flex-wrap: wrap;
    gap: 16px;
  }

  .page-eyebrow {
    font-size: 10.5px;
    font-weight: 600;
    letter-spacing: 2.5px;
    text-transform: uppercase;
    color: var(--gold-deep);
    margin-bottom: 6px;
  }

  .page-title {
    font-family: 'Playfair Display', serif;
    font-size: 36px;
    font-weight: 700;
    color: var(--charcoal);
    line-height: 1.1;
  }

  /* ── BUTTONS ── */
  .btn-primary {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 12px 22px; border-radius: var(--radius-md); border: none;
    background: linear-gradient(135deg, var(--rose-deep) 0%, var(--rose) 100%);
    color: #fff; font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 600;
    cursor: pointer; transition: all .2s ease;
    box-shadow: 0 4px 16px rgba(212,120,154,.20); white-space: nowrap;
  }
  .btn-primary:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(212,120,154,.28); }
  .btn-primary:active { transform: translateY(0); }

  .btn-primary-sm {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 8px 16px; border-radius: var(--radius-sm); border: none;
    background: linear-gradient(135deg, var(--rose-deep), var(--rose));
    color: #fff; font-family: 'Inter', sans-serif; font-size: 12.5px; font-weight: 600;
    cursor: pointer; transition: all .2s ease;
    box-shadow: 0 3px 10px rgba(212,120,154,.16); white-space: nowrap;
  }
  .btn-primary-sm:hover { transform: translateY(-1px); box-shadow: 0 6px 18px rgba(212,120,154,.22); }

  .btn-ghost {
    padding: 12px 20px; border-radius: var(--radius-md);
    border: 1.5px solid var(--border); background: transparent;
    color: var(--ink-soft); font-family: 'Inter', sans-serif;
    font-size: 13.5px; font-weight: 600; cursor: pointer; transition: all .2s ease;
  }
  .btn-ghost:hover { border-color: var(--rose-light); color: var(--rose-deep); background: var(--blush); }

  .btn-danger {
    padding: 12px 22px; border-radius: var(--radius-md); border: none;
    background: var(--danger); color: #fff;
    font-family: 'Inter', sans-serif; font-size: 13.5px; font-weight: 600;
    cursor: pointer; transition: all .2s ease;
  }
  .btn-danger:hover { background: #B8607A; transform: translateY(-1px); }

  .btn-icon {
    width: 38px; height: 38px; border-radius: var(--radius-sm);
    border: 1.5px solid var(--border); background: var(--white);
    color: var(--ink-soft); display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .2s ease; flex-shrink: 0;
  }
  .btn-icon:hover { border-color: var(--rose-light); color: var(--rose-deep); background: var(--blush); }

  .btn-icon-danger {
    width: 38px; height: 38px; border-radius: var(--radius-sm);
    border: 1.5px solid #F0CDB8; background: #FBEAE0;
    color: var(--danger); display: flex; align-items: center; justify-content: center;
    cursor: pointer; transition: all .2s ease; flex-shrink: 0;
  }
  .btn-icon-danger:hover { background: #F5DCC6; }

  /* ── SEARCH ── */
  .search-wrap {
    display: flex; align-items: center; gap: 12px;
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 13px 18px;
    margin-bottom: 24px; transition: border-color .2s; box-shadow: var(--shadow-sm);
  }
  .search-wrap:focus-within { border-color: var(--rose-light); box-shadow: 0 0 0 3px rgba(212,120,154,.10); }
  .search-input { flex: 1; border: none; outline: none; font-family: 'Inter', sans-serif; font-size: 14px; background: transparent; color: var(--ink); }
  .search-input::placeholder { color: var(--ink-muted); }

  /* ── CARDS ── */
  .card { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-lg); box-shadow: var(--shadow-sm); }

  .client-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(290px, 1fr)); gap: 16px; }

  .client-card-btn {
    width: 100%; text-align: left; font-family: inherit; cursor: pointer;
    background: var(--white); border: 1.5px solid var(--border);
    border-radius: var(--radius-lg); padding: 20px; display: flex; gap: 16px;
    box-shadow: var(--shadow-sm); transition: all .22s ease; animation: fadeUp .35s ease both;
  }
  .client-card-btn:hover { border-color: var(--rose-light); box-shadow: var(--shadow-md); transform: translateY(-2px); }

  .client-avatar {
    width: 52px; height: 52px; border-radius: 50%;
    background: linear-gradient(135deg, var(--gold) 0%, var(--rose) 100%);
    color: #fff; display: flex; align-items: center; justify-content: center;
    font-family: 'Playfair Display', serif; font-size: 17px; font-weight: 700;
    flex-shrink: 0; box-shadow: 0 3px 12px rgba(212,120,154,.16);
  }

  .client-card-name { font-size: 15.5px; font-weight: 600; color: var(--charcoal); margin-bottom: 4px; }
  .client-card-meta { display: flex; align-items: center; gap: 6px; font-size: 12.5px; color: var(--ink-soft); }
  .client-card-last { font-size: 11.5px; color: var(--ink-muted); margin-top: 6px; }

  .allergy-pill {
    display: inline-flex; align-items: center; gap: 4px; margin-top: 8px;
    font-size: 10.5px; font-weight: 700; color: var(--danger);
    background: #FBEAE0; border: 1px solid #F0CDB8;
    padding: 3px 9px; border-radius: 99px; letter-spacing: .3px;
  }

  .gold-divider {
    height: 1px;
    background: linear-gradient(90deg, transparent 0%, var(--gold-light) 30%, var(--gold) 50%, var(--gold-light) 70%, transparent 100%);
    margin: 6px 0;
  }

  /* ── TABS ── */
  .tabs-bar {
    display: flex; gap: 2px; background: var(--blush); border-radius: var(--radius-md);
    padding: 4px; margin-bottom: 24px; overflow-x: auto; scrollbar-width: none;
  }
  .tabs-bar::-webkit-scrollbar { display: none; }

  .tab-btn {
    display: flex; align-items: center; gap: 7px; padding: 9px 16px;
    border-radius: var(--radius-sm); border: none; background: transparent;
    color: var(--ink-soft); font-family: 'Inter', sans-serif; font-size: 13px;
    font-weight: 500; cursor: pointer; white-space: nowrap; transition: all .18s ease;
  }
  .tab-btn:hover { color: var(--rose-deep); }
  .tab-btn.active { background: var(--white); color: var(--rose-deep); font-weight: 600; box-shadow: 0 2px 8px rgba(212,120,154,.10); }

  /* ── PANEL ── */
  .panel { background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-lg); padding: 24px; box-shadow: var(--shadow-sm); }
  .panel-label { font-size: 10px; font-weight: 700; letter-spacing: 2px; text-transform: uppercase; color: var(--gold-deep); margin-bottom: 10px; }

  /* ── TIMELINE ── */
  .timeline { display: flex; flex-direction: column; gap: 0; }

  .hist-card { display: flex; gap: 16px; padding-bottom: 24px; position: relative; animation: fadeUp .3s ease both; }
  .hist-line { position: absolute; left: 16px; top: 34px; bottom: 0; width: 1px; background: linear-gradient(180deg, var(--border), transparent); }
  .hist-dot { width: 34px; height: 34px; border-radius: 50%; background: linear-gradient(135deg, var(--blush), var(--blush-mid)); border: 2px solid var(--border); color: var(--rose-deep); display: flex; align-items: center; justify-content: center; z-index: 1; flex-shrink: 0; }
  .hist-content { flex: 1; background: var(--white); border: 1.5px solid var(--border); border-radius: var(--radius-md); padding: 16px 18px; box-shadow: var(--shadow-sm); transition: box-shadow .2s; }
  .hist-content:hover { box-shadow: var(--shadow-md); }

  .hist-date { font-size: 11px; font-weight: 600; color: var(--ink-muted); letter-spacing: .5px; }
  .hist-service { font-size: 16px; font-weight: 600; font-family: 'Playfair Display', serif; color: var(--charcoal); margin-top: 2px; }

  .price-badge { font-size: 12.5px; font-weight: 700; color: var(--rose-deep); background: linear-gradient(135deg, var(--blush) 0%, #F5DCC6 100%); border: 1px solid var(--blush-mid); padding: 4px 12px; border-radius: 99px; }

  .detail-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; margin-top: 14px; }
  .detail-item { display: flex; flex-direction: column; gap: 2px; }
  .detail-label { font-size: 10px; font-weight: 600; color: var(--ink-muted); text-transform: uppercase; letter-spacing: .8px; }
  .detail-value { font-size: 13.5px; font-weight: 500; color: var(--ink); }

  .obs-box { margin-top: 12px; padding: 10px 14px; background: var(--blush); border-radius: var(--radius-sm); font-size: 13px; color: var(--ink-soft); line-height: 1.6; border-left: 3px solid var(--rose-light); }

  /* ── MODAL ── */
  .modal-overlay {
    position: fixed; inset: 0; background: rgba(40,25,20,.5);
    backdrop-filter: blur(6px); -webkit-backdrop-filter: blur(6px);
    display: flex; align-items: center; justify-content: center;
    padding: 20px; z-index: 200; animation: fadeIn .18s ease;
  }

  .modal-card {
    background: var(--pearl); border-radius: var(--radius-xl);
    width: 100%; max-width: 500px; max-height: 90vh;
    display: flex; flex-direction: column;
    box-shadow: var(--shadow-lg);
    animation: scaleIn .22s cubic-bezier(.22,.68,0,1.2);
    border: 1.5px solid var(--border);
  }
  .modal-card.wide { max-width: 660px; }
  .modal-card.narrow { max-width: 400px; }

  @keyframes scaleIn {
    from { opacity: 0; transform: scale(.94) translateY(12px); }
    to   { opacity: 1; transform: scale(1) translateY(0); }
  }

  .modal-header { display: flex; justify-content: space-between; align-items: center; padding: 22px 28px; border-bottom: 1.5px solid var(--border); flex-shrink: 0; }
  .modal-title { font-family: 'Playfair Display', serif; font-size: 20px; font-weight: 700; color: var(--charcoal); }
  .modal-close { width: 34px; height: 34px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--white); color: var(--ink-soft); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .18s; }
  .modal-close:hover { border-color: var(--rose-light); color: var(--rose-deep); background: var(--blush); }
  .modal-body { padding: 24px 28px; overflow-y: auto; flex: 1; }
  .modal-actions { display: flex; justify-content: flex-end; gap: 10px; padding: 16px 28px 24px; flex-shrink: 0; border-top: 1.5px solid var(--border); }

  /* ── FORM ── */
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }
  .field-full { grid-column: 1 / -1; }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field-label { font-size: 11.5px; font-weight: 600; color: var(--ink-soft); letter-spacing: .3px; }

  .input-field {
    padding: 11px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border);
    font-family: 'Inter', sans-serif; font-size: 13.5px; color: var(--ink);
    background: var(--white); outline: none; transition: border-color .18s, box-shadow .18s; width: 100%;
  }
  .input-field:focus { border-color: var(--rose-light); box-shadow: 0 0 0 3px rgba(212,120,154,.10); }
  .input-field::placeholder { color: var(--ink-muted); }
  textarea.input-field { min-height: 76px; resize: vertical; }
  select.input-field { cursor: pointer; }

  /* ── EMPTY STATE ── */
  .empty-state { display: flex; flex-direction: column; align-items: center; text-align: center; padding: 56px 24px; background: var(--white); border: 1.5px dashed var(--border); border-radius: var(--radius-xl); gap: 8px; color: var(--ink-muted); }
  .empty-icon { font-size: 32px; margin-bottom: 4px; opacity: .6; }
  .empty-title { font-family: 'Playfair Display', serif; font-size: 18px; font-weight: 600; color: var(--ink); }
  .empty-text { font-size: 13.5px; color: var(--ink-muted); max-width: 280px; }

  /* ── AGENDA ── */
  .agenda-toolbar { display: flex; justify-content: space-between; align-items: center; margin-bottom: 22px; flex-wrap: wrap; gap: 12px; }
  .nav-date-controls { display: flex; align-items: center; gap: 8px; }
  .btn-nav-arrow { width: 36px; height: 36px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--white); color: var(--ink-soft); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: all .18s; box-shadow: var(--shadow-sm); }
  .btn-nav-arrow:hover { border-color: var(--rose-light); color: var(--rose-deep); background: var(--blush); }
  .date-range-label { font-family: 'Playfair Display', serif; font-size: 15px; font-weight: 600; color: var(--charcoal); min-width: 140px; text-align: center; }
  .btn-today { padding: 7px 14px; border-radius: var(--radius-sm); border: 1.5px solid var(--border); background: var(--white); color: var(--ink-soft); font-family: 'Inter', sans-serif; font-size: 12px; font-weight: 600; cursor: pointer; transition: all .18s; box-shadow: var(--shadow-sm); }
  .btn-today:hover { border-color: var(--rose-light); color: var(--rose-deep); background: var(--blush); }
  .mode-toggle { display: flex; background: var(--blush); border-radius: var(--radius-md); padding: 4px; }
  .mode-btn { padding: 7px 16px; border-radius: var(--radius-sm); border: none; background: transparent; color: var(--ink-soft); font-family: 'Inter', sans-serif; font-size: 13px; font-weight: 500; cursor: pointer; transition: all .18s; }
  .mode-btn.active { background: var(--white); color: var(--rose-deep); font-weight: 600; box-shadow: 0 2px 8px rgba(212,120,154,.10); }

  .agenda-scroll { overflow-x: auto; -webkit-overflow-scrolling: touch; }
  .agenda-grid { display: grid; gap: 10px; min-width: 580px; }

<script type="text/babel">
  const { useState, useEffect, useMemo, useCallback, useRef } = React;

  const SK = { CLIENTS: "angela:clients", APTS: "angela:appointments", PHOTOS: "angela:photos:" };
  function sGet(key, fb) { try { const r = localStorage.getItem(key); return r === null ? fb : JSON.parse(r); } catch { return fb; } }
  function sSet(key, val) { try { localStorage.setItem(key, JSON.stringify(val)); return true; } catch(e) { return e.name === "QuotaExceededError" ? "quota" : false; } }
  function savePhotos(cid, fotos) { return sSet(SK.PHOTOS + cid, fotos); }
  function loadPhotos(cid) { return sGet(SK.PHOTOS + cid, []); }

  /* ── RESPALDO: exportar todo a un archivo descargable ── */
  function exportBackup(clients, apts) {
    const clientsWithPhotos = clients.map(c => ({ ...c, fotos: loadPhotos(c.id) }));
    const backup = {
      tipo: "respaldo-estudio-lash-designer",
      version: 1,
      fecha: new Date().toISOString(),
      clientes: clientsWithPhotos,
      citas: apts,
    };
    const blob = new Blob([JSON.stringify(backup, null, 2)], { type: "application/json" });
    const url = URL.createObjectURL(blob);
    const a = document.createElement("a");
    const fechaArchivo = localDate();
    a.href = url;
    a.download = `respaldo-estudio-lash-${fechaArchivo}.json`;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  /* ── RESPALDO: leer archivo y devolver los datos ── */
  function readBackupFile(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = e => {
        try {
          const data = JSON.parse(e.target.result);
          if (!data || data.tipo !== "respaldo-estudio-lash-designer" || !Array.isArray(data.clientes)) {
            reject(new Error("Este archivo no es un respaldo válido del estudio."));
            return;
          }
          resolve(data);
        } catch (err) {
          reject(new Error("No se pudo leer el archivo. Asegúrate de que sea el respaldo correcto."));
        }
      };
      reader.onerror = () => reject(new Error("No se pudo abrir el archivo."));
      reader.readAsText(file);
    });
  }

  const SERVICE_CATS = [
    { id:"pestanas",   label:"Extensión de pestañas", icon:"👁" },
    { id:"lifting",    label:"Lifting de pestañas",   icon:"✨" },
    { id:"laminado",   label:"Laminado de cejas",     icon:"🌿" },
    { id:"depilacion", label:"Depilación",             icon:"🌸" },
    { id:"unas",       label:"Uñas",                  icon:"💅" },
    { id:"otro",       label:"Otro servicio",          icon:"⭐" },
  ];

  const CURVATURAS = ["B","C","CC","D","DD","L","L+","M"];
  const GROSORES   = ["0.03","0.05","0.07","0.10","0.12","0.15","0.18","0.20","0.25"];
  const TECNICAS   = ["Clásicas","2D","3D","Híbrida","Rimel","Rimel Teach","Griegas","Hawaianas","Tecnológico 4D","Tecnológico 5D","Tecnológico 6D","Russian Teach","Wispy","Volumen Ruso","FOXY","Mega Volumen"];

  const catLabel = id => SERVICE_CATS.find(c => c.id === id)?.label || "Servicio";
  const catIcon  = id => SERVICE_CATS.find(c => c.id === id)?.icon  || "⭐";

  function uid(p="id") { return `${p}_${Date.now()}_${Math.random().toString(36).slice(2,8)}`; }

  function localDate() {
    const d = new Date();
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`;
  }

  function emptyClient() { return { id:uid("cli"), nombre:"", telefono:"", fechaNacimiento:"", observaciones:"", alergias:"", creadoEn:new Date().toISOString(), historial:[], fotos:[] }; }

  // Garantiza que un cliente (venga de donde venga: storage viejo, respaldo editado a mano, etc.)
  // siempre tenga todos los campos esperados, para que la app nunca truene por datos incompletos.
  function sanitizeClient(c) {
    if (!c || typeof c !== "object") return emptyClient();
    return {
      id: c.id || uid("cli"),
      nombre: typeof c.nombre === "string" ? c.nombre : "",
      telefono: typeof c.telefono === "string" ? c.telefono : "",
      fechaNacimiento: typeof c.fechaNacimiento === "string" ? c.fechaNacimiento : "",
      observaciones: typeof c.observaciones === "string" ? c.observaciones : "",
      alergias: typeof c.alergias === "string" ? c.alergias : "",
      creadoEn: c.creadoEn || new Date().toISOString(),
      historial: Array.isArray(c.historial) ? c.historial : [],
      fotos: Array.isArray(c.fotos) ? c.fotos : [],
      otrosServicios: Array.isArray(c.otrosServicios) ? c.otrosServicios : [],
      consentimiento: c.consentimiento && typeof c.consentimiento === "object" ? c.consentimiento : undefined,
    };
  }

  function sanitizeAppointment(a) {
    if (!a || typeof a !== "object") return null;
    return {
      id: a.id || uid("apt"),
      clienteId: typeof a.clienteId === "string" ? a.clienteId : "",
      clienteNombre: typeof a.clienteNombre === "string" ? a.clienteNombre : "",
      fecha: typeof a.fecha === "string" ? a.fecha : localDate(),
      hora: typeof a.hora === "string" ? a.hora : "10:00 AM",
      categoria: typeof a.categoria === "string" ? a.categoria : "pestanas",
      servicio: typeof a.servicio === "string" ? a.servicio : "",
      estado: ["pendiente","confirmada","completada","cancelada"].includes(a.estado) ? a.estado : "pendiente",
      notas: typeof a.notas === "string" ? a.notas : "",
    };
  }
  function emptyEntry()  { return { id:uid("h"), fecha:localDate(), categoria:"pestanas", servicio:"", tipoPestanas:"", curvatura:"", grosor:"", longitud:"", tecnica:"", mapping:"", productos:"", tiempoMinutos:"", precio:"", observaciones:"", retoque:"", retiro:"" }; }
  function emptyApt()    { return { id:uid("apt"), clienteId:"", clienteNombre:"", fecha:localDate(), hora:"10:00 AM", categoria:"pestanas", servicio:"", estado:"pendiente", notas:"" }; }

  function formatDate(iso) {
    if (!iso) return "";
    const s = iso.length === 10 ? iso + "T12:00:00" : iso;
    const d = new Date(s);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString("es-ES", { day:"numeric", month:"short" });
  }
  function formatDateLong(iso) {
    if (!iso) return "";
    const s = iso.length === 10 ? iso + "T12:00:00" : iso;
    const d = new Date(s);
    if (isNaN(d)) return iso;
    return d.toLocaleDateString("es-ES", { day:"numeric", month:"long", year:"numeric" });
  }

  function dateKey(d) { return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,"0")}-${String(d.getDate()).padStart(2,"0")}`; }
  function startOfWeek(d) { const x = new Date(d); x.setDate(x.getDate() - x.getDay()); x.setHours(0,0,0,0); return x; }
  function addDays(d, n) { const x = new Date(d); x.setDate(x.getDate()+n); return x; }
  function weekdayShort(d) { return d.toLocaleDateString("es-ES", {weekday:"short"}).replace(".",""); }
  function rangeLabel(days, mode) {
    if (mode === "dia") return days[0].toLocaleDateString("es-ES", {weekday:"long", day:"numeric", month:"long"});
    return `${days[0].getDate()} – ${days[6].getDate()} ${days[6].toLocaleDateString("es-ES",{month:"long"})}`;
  }

  /* SVG ICONS */
  const Ico = ({ n, s=18 }) => {
    const p = { width:s, height:s, viewBox:"0 0 24 24", fill:"none", stroke:"currentColor", strokeWidth:1.8, strokeLinecap:"round", strokeLinejoin:"round" };
    switch(n) {
      case "search":  return <svg {...p}><circle cx="10.5" cy="10.5" r="6.5"/><line x1="20" y1="20" x2="15.3" y2="15.3"/></svg>;
      case "plus":    return <svg {...p}><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>;
      case "back":    return <svg {...p}><line x1="19" y1="12" x2="5" y2="12"/><polyline points="11 6 5 12 11 18"/></svg>;
      case "check":   return <svg {...p}><polyline points="20 6 9 17 4 12"/></svg>;
      case "x":       return <svg {...p}><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>;
      case "edit":    return <svg {...p}><path d="M12 20h9"/><path d="M16.5 3.5a2.1 2.1 0 0 1 3 3L7 19l-4 1 1-4z"/></svg>;
      case "trash":   return <svg {...p}><polyline points="3 6 5 6 21 6"/><path d="M19 6l-1.5 14a2 2 0 0 1-2 1.8H8.5a2 2 0 0 1-2-1.8L5 6"/><path d="M10 11v5"/><path d="M14 11v5"/><path d="M9 6V4.5C9 3.7 9.7 3 10.5 3h3c.8 0 1.5.7 1.5 1.5V6"/></svg>;
      case "phone":   return <svg {...p}><path d="M5 4h3l2 5-2.5 1.5a11 11 0 0 0 5 5L14 13l5 2v3a2 2 0 0 1-2 2A16 16 0 0 1 3 6a2 2 0 0 1 2-2z"/></svg>;
      case "camera":  return <svg {...p}><path d="M4 8h3l1.5-2.5h7L17 8h3a1 1 0 0 1 1 1v10a1 1 0 0 1-1 1H4a1 1 0 0 1-1-1V9a1 1 0 0 1 1-1z"/><circle cx="12" cy="13.5" r="3.5"/></svg>;
      case "image":   return <svg {...p}><rect x="3" y="4" width="18" height="16" rx="2"/><circle cx="8.5" cy="9.5" r="1.5"/><path d="M21 16l-5-5-4 4-2-2-5 5"/></svg>;
      case "book":    return <svg {...p}><path d="M4 4.5C4 3.7 4.7 3 5.5 3H12v18H5.5c-.8 0-1.5-.7-1.5-1.5V4.5z"/><path d="M20 4.5c0-.8-.7-1.5-1.5-1.5H12v18h6.5c.8 0 1.5-.7 1.5-1.5V4.5z"/></svg>;
      case "cal":     return <svg {...p}><rect x="3" y="5" width="18" height="16" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/><line x1="8" y1="3" x2="8" y2="7"/><line x1="16" y1="3" x2="16" y2="7"/></svg>;
      case "list":    return <svg {...p}><line x1="9" y1="6" x2="20" y2="6"/><line x1="9" y1="12" x2="20" y2="12"/><line x1="9" y1="18" x2="20" y2="18"/><circle cx="4.5" cy="6" r=".8" fill="currentColor"/><circle cx="4.5" cy="12" r=".8" fill="currentColor"/><circle cx="4.5" cy="18" r=".8" fill="currentColor"/></svg>;
      case "star":    return <svg {...p}><path d="M12 3l2.6 5.8 6.4.7-4.8 4.3 1.3 6.2L12 16.8 6.5 20l1.3-6.2-4.8-4.3 6.4-.7z"/></svg>;
      case "alert":   return <svg {...p}><path d="M12 3 2 20h20L12 3z"/><line x1="12" y1="10" x2="12" y2="14.5"/><circle cx="12" cy="17.2" r=".4" fill="currentColor"/></svg>;
      case "chL":     return <svg {...p}><polyline points="15 18 9 12 15 6"/></svg>;
      case "chR":     return <svg {...p}><polyline points="9 18 15 12 9 6"/></svg>;
      case "clock":   return <svg {...p}><circle cx="12" cy="12" r="9"/><polyline points="12 7 12 12 16 14"/></svg>;
      case "doc":     return <svg {...p}><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="8" y1="13" x2="16" y2="13"/><line x1="8" y1="17" x2="16" y2="17"/></svg>;
      case "lock":    return <svg {...p}><rect x="3" y="11" width="18" height="11" rx="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/></svg>;
      case "download":return <svg {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>;
      case "upload":  return <svg {...p}><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>;
      default: return null;
    }
  };

  /* ── SIDEBAR LOGO ── */
  function SidebarLogo() {
    return (
      <div className="brand">
        <div className="brand-logo-wrap">
          {/* Butterflies top right */}
          <div className="butterflies">
            <span className="butterfly" style={{animationDelay:".3s"}}>🦋</span>
            <span className="butterfly" style={{animationDelay:"1.1s", fontSize:16}}>🦋</span>
          </div>

          {/* AL monogram in cursive */}
          <div className="brand-monogram-text">AL</div>

          {/* Decorative swash line */}
          <div className="brand-swash" />

          {/* ÁNGELA LÓPEZ */}
          <div className="brand-name">Ángela López</div>

          {/* ESTUDIO LASH DESIGNER box */}
          <div className="brand-subtitle-wrap">
            <span className="brand-subtitle">Estudio Lash Designer</span>
          </div>
        </div>
      </div>
    );
  }

  /* ══════ APP ══════ */
  function App() {
    const [view, setView]       = useState("clientes");
    const [clients, setClients] = useState([]);
    const [apts, setApts]       = useState([]);
    const [selId, setSelId]     = useState(null);
    const [loading, setLoading] = useState(true);
    const [toast, setToast]     = useState(null);
    const [showBackup, setShowBackup] = useState(false);

    useEffect(() => {
      const rawClients = sGet(SK.CLIENTS, []);
      const rawApts = sGet(SK.APTS, []);
      setClients(Array.isArray(rawClients) ? rawClients.map(sanitizeClient) : []);
      setApts(Array.isArray(rawApts) ? rawApts.map(sanitizeAppointment).filter(Boolean) : []);
      setLoading(false);
    }, []);

    const showToast = useCallback(msg => { setToast(msg); setTimeout(() => setToast(null), 2600); }, []);

    const saveClients = useCallback(next => {
      const clean = next.map(c => ({...c, fotos:[]}));
      const r = sSet(SK.CLIENTS, clean);
      if (r === "quota") showToast("⚠️ Espacio lleno. Elimina fotos antiguas.");
      else if (!r) showToast("Error al guardar.");
      setClients(next);
    }, [showToast]);

    const saveApts = useCallback(next => {
      const r = sSet(SK.APTS, next);
      if (r === "quota") showToast("⚠️ Espacio lleno.");
      else if (!r) showToast("Error al guardar.");
      setApts(next);
    }, [showToast]);

    const handleRestore = useCallback((data) => {
      // Sanitizar cada cliente y cita: si el archivo fue editado a mano o viene
      // de una versión anterior, esto evita que falten campos y la app se rompa.
      const clientesSanitizados = (Array.isArray(data.clientes) ? data.clientes : []).map(sanitizeClient);
      const aptsSanitizadas = (Array.isArray(data.citas) ? data.citas : []).map(sanitizeAppointment).filter(Boolean);

      // Restaurar clientes (guardando sus fotos por separado, como hace el resto de la app)
      const clientsClean = clientesSanitizados.map(c => {
        if (c.fotos && c.fotos.length) savePhotos(c.id, c.fotos);
        return { ...c, fotos: [] };
      });
      sSet(SK.CLIENTS, clientsClean);
      sSet(SK.APTS, aptsSanitizadas);
      setClients(clientesSanitizados); // en memoria sí puede llevar fotos temporalmente
      setApts(aptsSanitizadas);
      showToast("✅ Respaldo restaurado con éxito");
    }, [showToast]);

    const selClient = useMemo(() => clients.find(c => c.id === selId) || null, [clients, selId]);
    const openClient = id => { setSelId(id); setView("ficha"); };

    if (loading) return (
      <div style={{display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",height:"100vh",background:"var(--pearl)",gap:14}}>
        <div style={{fontFamily:"'Dancing Script',cursive",fontSize:52,color:"var(--gold)",textShadow:"0 2px 12px rgba(212,175,122,.4)"}}>AL</div>
        <p style={{fontFamily:"'Playfair Display',serif",fontSize:15,color:"var(--ink-soft)",letterSpacing:2,textTransform:"uppercase"}}>Ángela López · Estudio Lash Designer</p>
      </div>
    );

    return (
      <>
        <aside className="sidebar">
          <div className="sidebar-inner">
            <SidebarLogo />
            <nav className="sidebar-nav">
              {[{id:"clientes",label:"Clientas",icon:"book"},{id:"agenda",label:"Agenda",icon:"cal"}].map(item => (
                <button key={item.id} className={`nav-btn${(view===item.id||(view==="ficha"&&item.id==="clientes"))?" active":""}`} onClick={() => { setSelId(null); setView(item.id); }}>
                  <span className="nav-icon-wrap"><Ico n={item.icon} s={16}/></span>
                  {item.label}
                </button>
              ))}
            </nav>
            <div className="sidebar-footer">
              <button
                onClick={() => setShowBackup(true)}
                style={{
                  display:"flex", alignItems:"center", justifyContent:"center", gap:7,
                  width:"100%", padding:"9px 12px", borderRadius:10,
                  border:"1px solid rgba(255,255,255,.25)", background:"rgba(255,255,255,.08)",
                  color:"rgba(255,255,255,.85)", fontSize:11.5, fontWeight:600,
                  cursor:"pointer", marginBottom:12, transition:"all .18s"
                }}
              >
                <Ico n="lock" s={13}/> Respaldo de datos
              </button>
              <p className="sidebar-footer-text">© 2025 Ángela López</p>
            </div>
          </div>
        </aside>

        {showBackup && (
          <BackupModal
            clients={clients}
            apts={apts}
            onClose={() => setShowBackup(false)}
            onRestore={handleRestore}
            showToast={showToast}
          />
        )}

        <main className="main-content">
          {view === "clientes" && <ClientList clients={clients} onOpen={openClient} onCreate={nc => { const next=[nc,...clients]; saveClients(next); showToast("✨ Ficha creada"); openClient(nc.id); }}/>}
          {view === "ficha" && selClient && <ClientFile client={selClient} onBack={()=>setView("clientes")} onUpdate={upd => { const next=clients.map(c=>c.id===upd.id?upd:c); saveClients(next); if(upd.fotos?.length){const r=savePhotos(upd.id,upd.fotos);if(r==="quota")showToast("⚠️ Sin espacio para fotos.");} }} onDelete={id => { saveClients(clients.filter(c=>c.id!==id)); saveApts(apts.filter(a=>a.clienteId!==id)); setView("clientes"); showToast("Ficha eliminada"); }} showToast={showToast}/>}
          {view === "agenda"   && <Agenda apts={apts} clients={clients} onUpdate={saveApts} onOpenClient={openClient} showToast={showToast} onCreateClient={nc=>{const next=[nc,...clients];saveClients(next);showToast("✨ Ficha de "+nc.nombre+" creada");}}/>}
        </main>

        <nav className="bottom-nav">
          <div className="bottom-nav-inner">
            {[{id:"clientes",label:"Clientas",icon:"book"},{id:"agenda",label:"Agenda",icon:"cal"}].map(it => (
              <button key={it.id} className={`bottom-nav-btn${(view===it.id||(view==="ficha"&&it.id==="clientes"))?" active":""}`} onClick={() => { setSelId(null); setView(it.id); }}>
                <Ico n={it.icon} s={22}/>{it.label}
              </button>
            ))}
            <button className="bottom-nav-btn" onClick={() => setShowBackup(true)}>
              <Ico n="lock" s={22}/>Respaldo
            </button>
          </div>
        </nav>

        {toast && <div className="toast">{toast}</div>}
      </>
    );
  }

  /* ══════ CLIENT LIST ══════ */
  function ClientList({ clients, onOpen, onCreate }) {
    const [query, setQuery]     = useState("");
    const [showNew, setShowNew] = useState(false);
    const filtered = useMemo(() => { const q=query.trim().toLowerCase(); if(!q) return clients; return clients.filter(c=>c.nombre.toLowerCase().includes(q)||(c.telefono||"").includes(q)); }, [clients,query]);

    return (
      <div className="animate-in">
        <div className="page-header">
          <div><p className="page-eyebrow">Tu cartera de clientas</p><h1 className="page-title">Fichas</h1></div>
          <button className="btn-primary" onClick={()=>setShowNew(true)}><Ico n="plus" s={16}/> Nueva ficha</button>
        </div>
        <div className="search-wrap">
          <Ico n="search" s={17}/>
          <input className="search-input" placeholder="Buscar por nombre o teléfono…" value={query} onChange={e=>setQuery(e.target.value)} autoFocus/>
        </div>
        {filtered.length === 0 ? (
          <div className="empty-state animate-in stagger-2">
            <div className="empty-icon">🌸</div>
            <p className="empty-title">{clients.length===0?"Aún no hay fichas":"Sin coincidencias"}</p>
            <p className="empty-text">{clients.length===0?"Crea la primera ficha para comenzar.":"Intenta con otro nombre o teléfono."}</p>
          </div>
        ) : (
          <div className="client-grid">{filtered.map((c,i)=><ClientCard key={c.id} client={c} onOpen={()=>onOpen(c.id)} delay={i}/>)}</div>
        )}
        {showNew && <NewClientModal onClose={()=>setShowNew(false)} onSave={c=>{setShowNew(false);onCreate(c);}}/>}
      </div>
    );
  }

  function ClientCard({ client, onOpen, delay }) {
    const lastVisit = useMemo(()=>{ if(!client.historial.length) return null; return [...client.historial].sort((a,b)=>b.fecha.localeCompare(a.fecha))[0]; },[client.historial]);
    const initials = client.nombre.split(" ").filter(Boolean).slice(0,2).map(w=>w[0]?.toUpperCase()).join("");
    return (
      <button className="client-card-btn" onClick={onOpen} style={{animationDelay:`${delay*0.07}s`}}>
        <div className="client-avatar">{initials||"?"}</div>
        <div style={{display:"flex",flexDirection:"column",gap:4,minWidth:0}}>
          <div className="client-card-name">{client.nombre||"Sin nombre"}</div>
          <div className="client-card-meta"><Ico n="phone" s={12}/> {client.telefono||"Sin teléfono"}</div>
          {lastVisit ? <div className="client-card-last">Última visita · {formatDate(lastVisit.fecha)} · {catLabel(lastVisit.categoria)}</div> : <div className="client-card-last" style={{fontStyle:"italic"}}>Sin visitas registradas</div>}
          {client.alergias && <div className="allergy-pill"><Ico n="alert" s={11}/> Alergias</div>}
        </div>
      </button>
    );
  }

  function NewClientModal({ onClose, onSave }) {
    const [form, setForm] = useState(emptyClient());
    const set = k => e => setForm({...form,[k]:e.target.value});
    return (
      <Modal onClose={onClose} title="Nueva ficha de clienta">
        <div className="form-grid">
          <Field label="Nombre completo *" id="nc-n"><input id="nc-n" className="input-field" value={form.nombre} onChange={set("nombre")} autoFocus placeholder="Ej. María González"/></Field>
          <Field label="Teléfono" id="nc-t"><input id="nc-t" className="input-field" value={form.telefono} onChange={set("telefono")} placeholder="Ej. 0412-1234567"/></Field>
          <Field label="Fecha de nacimiento" id="nc-d"><input id="nc-d" type="date" className="input-field" value={form.fechaNacimiento} onChange={set("fechaNacimiento")}/></Field>
          <Field label="Alergias / contraindicaciones" id="nc-a"><input id="nc-a" className="input-field" value={form.alergias} onChange={set("alergias")} placeholder="Ej. Alergia al pegamento"/></Field>
          <Field label="Observaciones generales" id="nc-o" full><textarea id="nc-o" className="input-field" value={form.observaciones} onChange={set("observaciones")} placeholder="Detalles importantes…"/></Field>
        </div>
        <div className="modal-actions">
          <button className="btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn-primary" style={{opacity:form.nombre.trim()?1:.5}} disabled={!form.nombre.trim()} onClick={()=>onSave(form)}><Ico n="check" s={15}/> Crear ficha</button>
        </div>
      </Modal>
    );
  }

  function EditClientModal({ client, onClose, onSave }) {
    const [form, setForm] = useState({...client});
    const set = k => e => setForm({...form,[k]:e.target.value});
    return (
      <Modal onClose={onClose} title="Editar clienta">
        <div className="form-grid">
          <Field label="Nombre" id="ec-n"><input id="ec-n" className="input-field" value={form.nombre} onChange={set("nombre")} autoFocus/></Field>
          <Field label="Teléfono" id="ec-t"><input id="ec-t" className="input-field" value={form.telefono} onChange={set("telefono")}/></Field>
          <Field label="Alergias" id="ec-a"><input id="ec-a" className="input-field" value={form.alergias} onChange={set("alergias")}/></Field>
          <Field label="Fecha de nacimiento" id="ec-d"><input id="ec-d" type="date" className="input-field" value={form.fechaNacimiento} onChange={set("fechaNacimiento")}/></Field>
          <Field label="Observaciones" id="ec-o" full><textarea id="ec-o" className="input-field" value={form.observaciones} onChange={set("observaciones")}/></Field>
        </div>
        <div className="modal-actions">
          <button className="btn-ghost" onClick={onClose}>Cancelar</button>
          <button className="btn-primary" onClick={()=>onSave(form)}><Ico n="check" s={15}/> Guardar</button>
        </div>
      </Modal>
    );
  }

  /* ══════ CLIENT FILE ══════ */
  function ClientFile({ client, onBack, onUpdate, onDelete, showToast }) {
    const [tab, setTab]             = useState("info");
    const [editInfo, setEditInfo]   = useState(false);
    const [newEntry, setNewEntry]   = useState(false);
    const [confirmDel, setConfirmDel] = useState(false);

    useEffect(() => {
      const saved = loadPhotos(client.id);
      if (saved.length && !client.fotos.length) onUpdate({...client, fotos:saved});
    }, [client.id]);

    const sorted   = useMemo(() => [...client.historial].sort((a,b)=>b.fecha.localeCompare(a.fecha)), [client.historial]);
    const initials = client.nombre.split(" ").filter(Boolean).slice(0,2).map(w=>w[0]?.toUpperCase()).join("");

    const TABS = [
      {id:"info",     icon:"book",  label:"Observaciones"},
      {id:"historial",icon:"list",  label:`Historial (${client.historial.length})`},
      {id:"otros",    icon:"star",  label:"Otros servicios"},
      {id:"fotos",    icon:"camera",label:"Fotografías"},
      {id:"consent",  icon:"doc",   label:"Consentimiento"},
    ];

    return (
      <div className="animate-in">
        <button className="back-btn" onClick={onBack}><Ico n="back" s={15}/> Todas las clientas</button>
        <div className="file-header">
          <div className="file-header-left">
            <div className="file-avatar">{initials||"?"}</div>
            <div>
              <h1 className="page-title" style={{fontSize:28}}>{client.nombre}</h1>
              <div style={{display:"flex",alignItems:"center",gap:6,fontSize:13,color:"var(--ink-muted)",marginTop:4}}><Ico n="phone" s={13}/> {client.telefono||"Sin teléfono"}</div>
            </div>
          </div>
          <div style={{display:"flex",gap:8}}>
            <button className="btn-icon" title="Editar" onClick={()=>setEditInfo(true)}><Ico n="edit" s={15}/></button>
            <button className="btn-icon-danger" title="Eliminar ficha" onClick={()=>setConfirmDel(true)}><Ico n="trash" s={15}/></button>
          </div>
        </div>

        {client.alergias && <div className="allergy-banner animate-in stagger-2"><Ico n="alert" s={16}/> <span><strong>Alergias / contraindicaciones:</strong> {client.alergias}</span></div>}

        <div className="gold-divider" style={{margin:"16px 0"}}/>

        <div className="tabs-bar">
          {TABS.map(t=><button key={t.id} className={`tab-btn${tab===t.id?" active":""}`} onClick={()=>setTab(t.id)}><Ico n={t.icon} s={13}/> {t.label}</button>)}
        </div>

        {tab==="info" && (
          <div className="panel animate-in">
            <p className="panel-label">Observaciones generales</p>
            <div className="gold-divider" style={{margin:"0 0 14px"}}/>
            <p style={{fontSize:14.5,lineHeight:1.7,color:"var(--ink)"}}>{client.observaciones||"Sin observaciones registradas."}</p>
            {client.fechaNacimiento && <p style={{marginTop:14,fontSize:13,color:"var(--ink-muted)"}}>🎂 Nacimiento: <strong style={{color:"var(--ink)"}}>{formatDate(client.fechaNacimiento)}</strong></p>}
          </div>
        )}

        {tab==="historial" && (
          <div>
            <div className="section-row">
              <p style={{fontSize:13,color:"var(--ink-muted)",margin:0}}>De más reciente a más antiguo.</p>
              <button className="btn-primary-sm" onClick={()=>setNewEntry(true)}><Ico n="plus" s={14}/> Registrar servicio</button>
            </div>
            {sorted.length===0 ? (
              <div className="empty-state"><div className="empty-icon">✨</div><p className="empty-title">Sin servicios registrados</p><p className="empty-text">Registra el primer servicio de esta clienta.</p></div>
            ) : (
              <div className="timeline">{sorted.map((h,i)=><HistCard key={h.id} entry={h} delay={i} onDelete={()=>{onUpdate({...client,historial:client.historial.filter(x=>x.id!==h.id)});showToast("Servicio eliminado");}}/>)}</div>
            )}
          </div>
        )}

        {tab==="fotos"   && <PhotosPanel   client={client} onUpdate={onUpdate} showToast={showToast}/>}
        {tab==="otros"   && <OtrosPanel    client={client} onUpdate={onUpdate} showToast={showToast}/>}
        {tab==="consent" && <ConsentPanel  client={client} onUpdate={onUpdate} showToast={showToast}/>}

        {editInfo && <EditClientModal client={client} onClose={()=>setEditInfo(false)} onSave={u=>{onUpdate(u);setEditInfo(false);showToast("Datos actualizados");}}/>}
        {newEntry && <HistModal onClose={()=>setNewEntry(false)} onSave={e=>{onUpdate({...client,historial:[e,...client.historial]});setNewEntry(false);showToast("✨ Servicio registrado");}}/>}
        {confirmDel && (
          <Modal onClose={()=>setConfirmDel(false)} title="Eliminar ficha" narrow>
            <p style={{fontSize:14,lineHeight:1.6,color:"var(--ink)"}}>¿Eliminar la ficha de <strong>{client.nombre}</strong>? Esta acción no se puede deshacer.</p>
            <div className="modal-actions">
              <button className="btn-ghost" onClick={()=>setConfirmDel(false)}>Cancelar</button>
              <button className="btn-danger" onClick={()=>onDelete(client.id)}>Eliminar ficha</button>
            </div>
          </Modal>
        )}
      </div>
    );
  }

  function HistCard({ entry, onDelete, delay }) {
    const [confirmDel, setConfirmDel] = useState(false);
    const details = [["Tipo",entry.tipoPestanas],["Curvatura",entry.curvatura],["Grosor",entry.grosor?entry.grosor+" mm":""],["Longitud",entry.longitud],["Técnica",entry.tecnica],["Mapping",entry.mapping],["Productos",entry.productos],["Tiempo",entry.tiempoMinutos?entry.tiempoMinutos+" min":""],["Retoque",entry.retoque],["Retiro",entry.retiro]].filter(([,v])=>v);
    return (
      <div className="hist-card" style={{animationDelay:`${delay*0.08}s`}}>
        <div className="hist-line"/>
        <div className="hist-dot">{catIcon(entry.categoria)}</div>
        <div className="hist-content">
          <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",gap:8}}>
            <div><div className="hist-date">{formatDate(entry.fecha)}</div><div className="hist-service">{entry.servicio||catLabel(entry.categoria)}</div></div>
            <div style={{display:"flex",alignItems:"center",gap:8,flexShrink:0}}>
              {entry.precio && <span className="price-badge">${entry.precio}</span>}
              <button style={{background:"none",border:"none",color:"var(--ink-muted)",cursor:"pointer",padding:"4px",display:"flex",alignItems:"center"}} onClick={()=>setConfirmDel(true)}><Ico n="trash" s={14}/></button>
            </div>
          </div>
          {details.length>0 && <div className="detail-grid">{details.map(([l,v])=><div key={l} className="detail-item"><span className="detail-label">{l}</span><span className="detail-value">{v}</span></div>)}</div>}
          {entry.observaciones && <div className="obs-box"><strong style={{color:"var(--ink)"}}>Nota:</strong> {entry.observaciones}</div>}
          {confirmDel && <div className="inline-confirm"><span>¿Eliminar este servicio?</span><button className="link-danger" onClick={onDelete}>Sí, eliminar</button><button className="link-soft" onClick={()=>setConfirmDel(false)}>Cancelar</button></div>}
        </div>
      </div>
    );
  }

  function HistModal({ onClose, onSave }) {
    const [form, setForm] = useState(emptyEntry());
    const set = k => e => setForm({...form,[k]:e.target.value});
    const isLash = form.categoria === "pestanas" || form.categoria === "lifting";
    return (
      <Modal onClose={onClose} title="Registrar servicio" wide>
        <div className="form-grid">
          <Field label="Fecha" id="h-f"><input id="h-f" type="date" className="input-field" value={form.fecha} onChange={set("fecha")}/></Field>
          <Field label="Categoría" id="h-c"><select id="h-c" className="input-field" value={form.categoria} onChange={set("categoria")}>{SERVICE_CATS.map(c=><option key={c.id} value={c.id}>{c.icon} {c.label}</option>)}</select></Field>

            <Field label="Grosor" id="h-gr"><select id="h-gr" className="input-field" value={form.grosor} onChange={set("grosor")}><option value="">Seleccionar…</option>{GROSORES.map(g=><option key={g} value={g}>{g} mm</option>)}</select></Field>

            <Field label="Mapping" id="h-map"><input id="h-map" className="input-field" value={form.mapping} onChange={set("mapping")} placeholder="Ej. Doll eye"/></Field>

            <Field label="Retiro" id="h-ri"><select id="h-ri" className="input-field" value={form.retiro} onChange={set("retiro")}><option value="">— Sin retiro —</option><option value="Sí">Sí</option><option value="No">No</option><option value="Parcial">Parcial</option></select></Field>
          </>}
          <Field label="Precio" id="h-pr2"><input id="h-pr2" type="number" min="0" className="input-field" value={form.precio} onChange={set("precio")} placeholder="Ej. 25"/></Field>
